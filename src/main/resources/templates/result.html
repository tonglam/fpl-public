<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::header(~{::title},~{})">
    <title>查看赛果-自定义赛事-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content">

            <h1 style="font-size: 28px">查看赛果</h1>

            <div style="margin-top: 20px"></div>

            <div style="margin-top: 20px"></div>

            <div class="layui-tab" lay-allowClose="true" lay-filter="tournamentTab">
                <ul class="layui-tab-title">
                    <li class="layui-this" th:text="${entryInfo.getEntryName()}"></li>
                </ul>
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="entryTournamentTable" lay-filter="entryTournamentTable"></table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

<script th:replace="layout::baseScript"></script>

</body>

<script th:inline="none">

    layui.use(['element', 'table', 'layer', 'soulTable', 'laydate'], function () {

        let $ = layui.jquery, element = layui.element, table = layui.table, soulTable = layui.soulTable,
            laydate = layui.laydate;

        layer.ready(function () {
            if ($("button[name=teamIdBtn]").html() == "请输入id") {
                layer.prompt({
                    title: '请输入team_id',
                    offset: '100px',
                    shade: 0.8,
                    success: function (layero) {
                        // 确认按钮
                        $(".layui-layer-btn0").on("click", function () {
                            // 校验
                            let entry = layero.find("input").val();
                            if (!new RegExp("^[1-9]\\d*$").test(entry)) {
                                layer.msg('team_id需为正整数', {
                                    offset: '100px',
                                    shade: 0,
                                    shadeClose: true,
                                    time: 1000
                                });
                                layero.find("input").val('');
                                return false;
                            }
                            // 保存
                            axios.get('/saveEntry?entry=' + entry)
                                .then(function () {
                                    layer.close();
                                    // 刷新
                                    window.location.replace("/tournament/result");
                                })
                                .catch(function (error) {
                                    console.info(error.message);
                                });
                        })
                    }
                });
            }
        });

        soulTable.config({
            drag: false,
            overflow: {
                type: 'tips',
                header: true,
                total: true
            }
        });

        laydate.render({
            elem: 'input[name=createTime]'
        });

        table.render({
            elem: '#entryTournamentTable',
            method: 'get',
            url: '/tournament/qryEntryTournamenList',
            loading: true,
            cellMinWidth: 100,
            cols: [[
                {field: 'name', title: '赛事名字', align: 'center', width: 300, templet: '#nameTpl'},
                {field: 'creator', title: '创建者', align: 'center'},
                {field: 'season', title: '赛季', align: 'center'},
                {field: 'leagueType', title: '类型', align: 'center'},
                {field: 'leagueId', title: '官方联赛id', align: 'center'},
                {field: 'createTime', title: '创建时间', align: 'center', width: 120}
            ]],
            initSort: {
                field: 'createTime',
                type: 'asc'
            },
            id: 'name',
            done: function () {
                soulTable.render(this);
            }
        });

        table.on('row(entryTournamentTable)', function (obj) {
            let id = obj.data.tournamentId, name = obj.data.name;
            // 是否存在
            if ($(".layui-tab-title li[lay-id='" + name + "']").length > 0) {
                //选项卡已经存在
                element.tabChange('tournamentTab', id);
                return false;
            }
            // 增加标签页
            element.tabAdd('tournamentTab', {
                title: name,
                content: '<table class="layui-table" id=tournamentTable lay-filter=tournamentTable></table>',
                id: id
            });
            // 切换
            element.tabChange('tournamentTab', id);
        });

        element.on('tab(tournamentTab)', function () {
            let id = $(this).attr("lay-id");
            if (id == null) {
                return false;
            }
        });

    });

</script>

<script id="nameTpl" type="text/html">
    <a href="javascript:void(0);" class="layui-table-link">{{d.name}}</a>
</script>

</html>
