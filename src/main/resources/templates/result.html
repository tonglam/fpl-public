<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::header(~{::title},~{})">
    <title>查看赛果-自定义赛事-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content">

            <h1 style="font-size: 28px">查看赛果</h1>

            <div style="margin-top: 50px"></div>

            <table class="layui-table" id="tournamentTable" lay-filter="tournamentTable"
                   style="width: 100%"></table>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

<script th:replace="layout::baseScript"></script>

</body>

<script th:inline="none">

    layui.use(['table', 'layer', 'soulTable', 'laydate'], function () {

        let $ = layui.jquery, table = layui.table, soulTable = layui.soulTable, laydate = layui.laydate;

        layer.ready(function () {
            if ($("button[name=teamIdBtn]").html() == "请输入id") {
                layer.prompt({
                    title: '请输入team_id',
                    offset: '100px',
                    shade: 0.8,
                    success: function (layero) {
                        // 确认按钮
                        $(".layui-layer-btn0").on("click", function () {
                            // 校验
                            let entry = layero.find("input").val();
                            if (!new RegExp("^[1-9]\\d*$").test(entry)) {
                                layer.msg('team_id需为正整数', {
                                    offset: '100px',
                                    shade: 0,
                                    shadeClose: true,
                                    time: 1000
                                });
                                layero.find("input").val('');
                                return false;
                            }
                            // 保存
                            axios.get('/saveEntry?entry=' + entry)
                                .then(function () {
                                    layer.close();
                                    // 刷新
                                    window.location.replace("/tournament/result");
                                })
                                .catch(function (error) {
                                    console.info(error.message);
                                });
                        })
                    }
                });
            }
        });

        soulTable.config({
            drag: false,
            overflow: {
                type: 'tips',
                header: true,
                total: true
            }
        });

        laydate.render({
            elem: 'input[name=createTime]'
        });

        table.render({
            elem: '#tournamentTable',
            method: 'get',
            url: '/tournament/qryEntryTournamenList',
            loading: true,
            width: 900,
            cols: [[
                {field: 'name', title: '赛事名字', align: 'center', templet: '#nameTpl'},
                {field: 'creator', title: '创建者', align: 'center', width: '18%'},
                {field: 'season', title: '赛季', align: 'center', width: '10%'},
                {field: 'leagueType', title: '类型', align: 'center', width: '10%'},
                {field: 'leagueId', title: '官方联赛id', align: 'center', width: '15%'},
                {field: 'createTime', title: '创建时间', align: 'center', width: '18%'}
            ]],
            initSort: {
                field: 'createTime',
                type: 'asc'
            },
            id: 'name',
            done: function () {
                soulTable.render(this);
            }
        });

    });

</script>

<script id="nameTpl" type="text/html">
    <a href="/tournament/result?id={{d.tournamentId}}" class="layui-table-link">{{d.name}}</a>
</script>

</html>
