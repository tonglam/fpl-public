<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout::header(~{::title},~{})">
    <title>创建赛事-自定义赛事-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content" style="min-width: 900px">

            <h1 style="font-size: 28px">创建自定义赛事</h1>

            <div style="margin-top: 30px"></div>

            <div class="layui-tab layui-tab-brief" lay-filter="typeTab">

                <ul class="layui-tab-title">
                    <li class="layui-this" id="normal">普通赛事</li>
                    <li id="zhejiang">浙江联赛</li>
                </ul>

                <div class="layui-tab-content">

                    <div class="layui-tab-item layui-show">

                        <form class="layui-form" lay-filter="tournamentForm">

                            <!-- 基本设定 -->
                            <div class="layui-hide" id="baseConfig">

                                <fieldset class="layui-elem-field layui-field-title site-title"
                                          style="margin-top: 30px">
                                    <legend><a>赛事信息</a></legend>
                                </fieldset>

                                <div class="layui-form-item" id="url">
                                    <label class="layui-form-label label-required">官方联赛</label>
                                    <div class="layui-input-inline" style="width: 50%">
                                        <input autocomplete="on" class="layui-input" lay-reqtext="url不能为空"
                                               lay-verify="required"
                                               name="url"
                                               placeholder="https://fantasy.premierleague.com/leagues/***/standings/*"
                                               type="text">
                                    </div>
                                    <div class="layui-form-mid layui-word-aux" id="totalTeam"></div>
                                </div>

                                <div class="layui-form-item" id="tournamentName">
                                    <label class="layui-form-label label-required">赛事名称</label>
                                    <div class="layui-input-inline" style="width: 30%">
                                        <input autocomplete="on" class="layui-input" lay-reqtext="赛事名称不能为空"
                                               lay-verify="required"
                                               name="tournamentName" type="text">
                                    </div>
                                    <i class="layui-hide layui-icon layui-icon-ok" id="nameTipsIcon"
                                       style="color:black"></i>
                                </div>

                                <div class="layui-form-item" id="adminer">
                                    <label class="layui-form-label label-required">管理员id</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" lay-reqtext="管理员id不能为空" lay-verify="required"
                                               name="adminerEntry"
                                               th:placeholder="${session.entry}? ${session.entry} : '请输入管理员id'"
                                               type="number">
                                    </div>
                                </div>

                                <div class="layui-form-item" id="creator">
                                    <label class="layui-form-label label-required">创建人</label>
                                    <div class="layui-input-inline">
                                        <input autocomplete="on" class="layui-input" lay-reqtext="赛事创建人不能为空"
                                               lay-verify="required" name="creator" type="text">
                                    </div>
                                </div>

                            </div>

                            <!-- 小组赛设定 -->
                            <div class="layui-hide" id="groupConfig">

                                <fieldset class="layui-elem-field layui-field-title site-title"
                                          style="margin-top: 30px">
                                    <legend><a>小组赛设定</a></legend>
                                </fieldset>

                                <div class="layui-form-item" id="groupMode">
                                    <div class="layui-inline">
                                        <label class="layui-form-label label-required">小组赛模式</label>
                                        <div class="layui-input-block">
                                            <select class="layui-select" lay-filter="groupMode" lay-reqtext="请选择小组赛模式"
                                                    lay-verify="required"
                                                    name="groupMode">
                                                <option value=""></option>
                                                <option value="0">无小组赛</option>
                                                <option value="1">积分赛</option>
                                                <option value="2">对阵赛</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="layui-hide layui-form-item" id="groupGw">
                                    <div class="layui-inline" id="groupStartGw">
                                        <label class="layui-form-label label-required">开始时间</label>
                                        <div class="layui-input-block">
                                            <select class="layui-select" lay-filter="groupStartGw" lay-search=""
                                                    lay-verify="required"
                                                    name="groupStartGw">
                                                <option th:each="item,userStat:${gwMap}"
                                                        th:text="${userStat.current.value}"
                                                        th:value="${userStat.current.key}"></option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="layui-inline" id="groupEndGw">
                                        <label class="layui-form-label label-required">结束时间</label>
                                        <div class="layui-input-block">
                                            <select class="layui-select" lay-filter="groupEndGw" lay-search=""
                                                    lay-verify="required"
                                                    name="groupEndGw">
                                                <option th:each="item,userStat:${gwMap}"
                                                        th:text="${userStat.current.value}"
                                                        th:value="${userStat.current.key}"></option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="layui-hide layui-form-item" id="groupTeamsPerGroup">
                                    <label class="layui-form-label label-required">每组队伍</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" lay-verify="required" name="groupTeamsPerGroup"
                                               type="number">
                                    </div>
                                    <div class="layui-form-mid layui-word-aux" id="groupNum"></div>
                                </div>

                                <div class="layui-hide layui-form-item" id="groupFillAverage">
                                    <div class="layui-row">
                                        <div class="layui-col-sm1" style="margin-right: 35px">
                                            <label class="layui-form-label">平均分</label>
                                        </div>
                                        <div class="layui-col-sm2" style="margin-right: 48px">
                                            <input class="layui-input" lay-filter="groupFillAverage" lay-skin="switch"
                                                   lay-text="是|否"
                                                   name="groupFillAverage" type="checkbox" value=1>
                                        </div>
                                        <div class="layui-col-sm6">
                                            <div class="layui-form-mid layui-word-aux" id="fillAverageTips"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="layui-hide layui-form-item" id="groupQualifiers">
                                    <label class="layui-form-label label-required">出线数量</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" name="groupQualifiers" type="number">
                                    </div>
                                    <div class="layui-form-mid layui-word-aux">每个小组出线的队伍数量</div>
                                </div>

                            </div>

                            <!-- 淘汰赛设定 -->
                            <div class="layui-hide" id="knockoutConfig">

                                <fieldset class="layui-elem-field layui-field-title site-title"
                                          style="margin-top: 30px">
                                    <legend><a>淘汰赛设定</a></legend>
                                </fieldset>

                                <div class="layui-form-item" id="knockoutMode">
                                    <div class="layui-inline">
                                        <label class="layui-form-label label-required">淘汰赛模式</label>
                                        <div class="layui-input-block">
                                            <select class="layui-select" lay-filter="knockoutMode"
                                                    lay-reqtext="请选择淘汰赛模式"
                                                    lay-verify="required"
                                                    name="knockoutMode">
                                                <option value=""></option>
                                                <option value="0">无淘汰赛</option>
                                                <option value="1">单循环</option>
                                                <option value="2">主客场</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="layui-hide layui-form-item" id="knockoutRounds">
                                    <label class="layui-form-label">轮次</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" name="knockoutRounds" readonly>
                                    </div>
                                    <div class="layui-form-mid layui-word-aux" id="knockoutTeams"></div>
                                </div>

                                <div class="layui-hide layui-form-item" id="knockoutEvents">
                                    <label class="layui-form-label">比赛周数</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" name="knockoutEvents" readonly>
                                    </div>
                                </div>

                                <div class="layui-form-item" id="knockoutGw">
                                    <div class="layui-inline layui-hide" id="knockoutStartGwSelect">
                                        <label class="layui-form-label label-required">开始时间</label>
                                        <div class="layui-input-block">
                                            <select class="layui-select" lay-filter="knockoutStartGwSelect"
                                                    lay-search=""
                                                    name="knockoutStartGwSelect">
                                                <option th:each="item,userStat:${gwMap}"
                                                        th:text="${userStat.current.value}"
                                                        th:value="${userStat.current.key}"></option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="layui-inline layui-hide" id="knockoutStartGw">
                                        <label class="layui-form-label">开始时间</label>
                                        <div class="layui-input-inline">
                                            <input class="layui-input" name="knockoutStartGw" readonly>
                                        </div>
                                    </div>
                                    <div class="layui-inline layui-hide" id="knockoutEndGw">
                                        <label class="layui-form-label">结束时间</label>
                                        <div class="layui-input-inline">
                                            <input class="layui-input" name="knockoutEndGw" readonly>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            <!-- 提交 -->
                            <div class="layui-hide layui-form-item" id="createButton">
                                <div class="layui-input-block">
                                    <button class="layui-btn" id="submitButton" lay-filter="createTournament"
                                            lay-submit="createTournament" type="submit">创建赛事
                                    </button>
                                </div>
                            </div>

                        </form>

                    </div>

                    <div class="layui-tab-item">

                        <form class="layui-form" lay-filter="zjTournamentForm">

                            <div class="layui-hide" id="zjGroupNum" th:text="${zjGroupNum}"></div>
                            <div class="layui-hide" id="zjTeamPerGroup" th:text="${zjTeamPerGroup}"></div>

                            <fieldset class="layui-elem-field layui-field-title site-title" style="margin-top: 30px">
                                <legend><a>赛事信息</a></legend>
                            </fieldset>

                            <div class="layui-form-item">
                                <label class="layui-form-label label-required">赛事名称</label>
                                <div class="layui-input-inline" style="width: 30%">
                                    <input autocomplete="on" class="layui-input" lay-reqtext="赛事名称不能为空"
                                           lay-verify="required"
                                           name="zjTournamentName" type="text">
                                </div>
                                <i class="layui-hide layui-icon layui-icon-ok" id="zjNameTipsIcon"
                                   style="color:black"></i>
                            </div>

                            <div class="layui-form-item">
                                <label class="layui-form-label label-required">分组数量</label>
                                <div class="layui-input-inline">
                                    <input autocomplete="off" class="layui-input" lay-reqtext="分组数量不能为空"
                                           lay-verify="required" name="zjGroupNum" th:value="${zjGroupNum}"
                                           type="number">
                                </div>
                                <label class="layui-form-label label-required">每组队伍</label>
                                <div class="layui-input-inline">
                                    <input autocomplete="off" class="layui-input" lay-reqtext="分组数量不能为空"
                                           lay-verify="required" name="zjTeamPerGroup" th:value="${zjTeamPerGroup}"
                                           type="number">
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <label class="layui-form-label label-required">管理员id</label>
                                <div class="layui-input-inline">
                                    <input class="layui-input" lay-reqtext="管理员id不能为空" lay-verify="required"
                                           name="zjAdminerEntry"
                                           th:placeholder="${session.entry}? ${session.entry} : '请输入管理员id'"
                                           type="number">
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <label class="layui-form-label label-required">创建人</label>
                                <div class="layui-input-inline">
                                    <input autocomplete="on" class="layui-input" lay-reqtext="赛事创建人不能为空"
                                           lay-verify="required" name="zjCreator" type="text">
                                </div>
                            </div>

                            <fieldset class="layui-elem-field layui-field-title site-title" style="margin-top: 30px">
                                <legend><a>赛事时间</a></legend>
                            </fieldset>

                            <div class="layui-form-item">
                                <label class="layui-form-label label-required">积分赛轮次</label>
                                <div class="layui-input-inline">
                                    <input autocomplete="off" class="layui-input" lay-reqtext="积分赛轮次不能为空"
                                           lay-verify="required" name="zjPointsRound" type="number">
                                </div>
                                <div class="layui-inline">
                                    <label class="layui-form-label label-required">开始时间</label>
                                    <div class="layui-input-block">
                                        <select class="layui-select" lay-filter="zjPointsStartGw" lay-search=""
                                                name="zjPointsStartGw">
                                            <option th:each="item,userStat:${gwMap}"
                                                    th:text="${userStat.current.value}"
                                                    th:value="${userStat.current.key}"></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="layui-inline" style="margin-left: 10px">
                                    <label class="layui-form-label">结束时间</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" name="zjPointsEndGw" readonly>
                                    </div>
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <label class="layui-form-label label-required">对阵赛轮次</label>
                                <div class="layui-input-inline">
                                    <input autocomplete="off" class="layui-input" lay-reqtext="对阵赛轮次不能为空"
                                           lay-verify="required" name="zjBattleRound" type="number">
                                </div>
                                <div class="layui-inline">
                                    <label class="layui-form-label">开始时间</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" name="zjBattleStartGw" readonly>
                                    </div>
                                </div>
                                <div class="layui-inline">
                                    <label class="layui-form-label">结束时间</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" name="zjBattleEndGw" readonly>
                                    </div>
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <label class="layui-form-label label-required">PK轮次</label>
                                <div class="layui-input-inline">
                                    <input autocomplete="off" class="layui-input" lay-reqtext="PK轮次不能为空"
                                           lay-verify="required" name="zjPkRound" type="number">
                                </div>
                                <div class="layui-inline">
                                    <label class="layui-form-label">开始时间</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" name="zjPkStartGw" readonly>
                                    </div>
                                </div>
                                <div class="layui-inline">
                                    <label class="layui-form-label">结束时间</label>
                                    <div class="layui-input-inline">
                                        <input class="layui-input" name="zjPkEndGw" readonly>
                                    </div>
                                </div>
                            </div>

                            <fieldset class="layui-elem-field layui-field-title site-title" style="margin-top: 30px">
                                <legend><a title="点击单元格，输入team_id">赛事分组</a></legend>
                            </fieldset>

                            <div class="layui-row layui-col-space30" th:each="index:${#numbers.sequence(1,showNum)}">

                                <div class="layui-col-md6 layui-hide" th:attr="id='zjGroup'+((${index}*2)-1)">
                                    <div style="font-size: 18px" th:attr="id='zjGroup'+((${index}*2)-1)+'Name'"></div>
                                    <table class="layui-table"
                                           th:attr="lay-filter='zjGroup'+((${index}*2)-1)+'Table',id='zjGroup'+((${index}*2)-1)+'Table'">
                                        <thead>
                                        <tr>
                                            <th lay-data="{field:'index', align:'center', width:40, style:'background-color: #2F4056; color: #fff;'}"></th>
                                            <th lay-data="{field:'', align:'center', templet: '#captainTpl', unresize: true}">
                                                队长
                                            </th>
                                            <th lay-data="{field:'entry', align:'center', width:100, style:'background-color: #5FB878; color: #fff;', edit:true}">
                                                team_id
                                            </th>
                                            <th lay-data="{field:'entryName', align:'center', width:150}">队伍名称</th>
                                            <th lay-data="{field:'playerName', align:'center', width:130}">球员名称</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="index:${#numbers.sequence(1,zjTeamPerGroup)}">
                                            <td th:text="${index}"></td>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div class="layui-col-md6 layui-hide" th:attr="id='zjGroup'+${index}*2">
                                    <div style="font-size: 18px" th:attr="id='zjGroup'+${index}*2+'Name'"></div>
                                    <table class="layui-table"
                                           th:attr="lay-filter='zjGroup'+${index}*2+'Table',id='zjGroup'+${index}*2+'Table'">
                                        <thead>
                                        <tr>
                                            <th lay-data="{field:'index', align:'center', width:40, style:'background-color: #2F4056; color: #fff;'}"></th>
                                            <th lay-data="{field:'', align:'center', templet: '#captainTpl', unresize: true}">
                                                队长
                                            </th>
                                            <th lay-data="{field:'entry', align:'center', width:100, style:'background-color: #5FB878; color: #fff;', edit:true}">
                                                team_id
                                            </th>
                                            <th lay-data="{field:'entryName', align:'center', width:150}">队伍名称</th>
                                            <th lay-data="{field:'playerName', align:'center', width:130}">球员名称</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="index:${#numbers.sequence(1,zjTeamPerGroup)}">
                                            <td th:text="${index}"></td>
                                            <td></td>
                                            <td></td>
                                            <td></td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>

                            </div>

                            <div style="margin-top: 30px"></div>

                            <button class="layui-btn" id="submitZjButton" lay-filter="createZjTournament"
                                    lay-submit="createZjTournament" type="button">创建赛事
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

<div th:replace="/tournament/rule::main"></div>

</body>

<script th:replace="layout::baseScript"></script>

<script id="captainTpl" type="text/html">
    <input type="radio" name="captain" value="{{d.index}}" title="" lay-filter="captain" {{ d.index== 1
           ? 'checked' : '' }}>
</script>

<script>
    layui.use(['form', 'layer', 'table', 'soulTable', 'util'], function () {
        let $ = layui.jquery, form = layui.form, layer = layui.layer, table = layui.table, soulTable = layui.soulTable,
            util = layui.util;

        $(document).ready(function () {
            $("#rule").addClass("layui-hide");
        });

        /**
         * 公告层
         *
         * @author 2020.08.15
         */
        layer.ready(function () {
            $("#baseConfig").removeClass("layui-hide");
            layer.open({
                type: 1,
                title: false,
                closeBtn: true,
                time: 2500,
                area: '400px;',
                shade: 0.8,
                shadeClose: true,
                moveType: 1,
                content: '<div style="padding: 50px; line-height: 22px; background-color: #393D49; color: #fff; font-weight: 300;">' +
                    '输入官方联赛url来开始创建你的自定义联赛吧！' + '<br><br>' + 'ps：*为标单必填项' + '</div>'
            })
        });

        /**
         * 底部固定块
         * 1.返回顶部
         * 2.‘？’，打开新窗口展示规则'/tournament/rule'
         *
         * @author tong 2020.08.13
         */
        util.fixbar({
            bar1: "&#xe607;", click: function (type) {
                if (type == 'bar1') {
                    layer.open({
                        type: 1,
                        title: '自定义赛事规则',
                        area: ['750px', '75%'],
                        offset: ['100px', '1100px'],
                        maxmin: false,
                        content: $("#rule").html(),
                        shade: 0.01,
                        shadeClose: true,
                        resize: false
                    });
                }
            }
        });

        // 普通联赛

        /**
         * 监听url输入框：失去焦点
         * 1.校验url，不合法时，清空联赛队伍数量
         * 2.计算联赛队伍数量
         * 3.显示小组赛配置
         *
         * @author tong 2020.08.13
         */
        $("input[name=url]").on('focusout', function () {
            let groupConfigDiv = $("#groupConfig");
            let totalTeamDom = $("#totalTeam");
            // 校验url
            let url = formatUrl($(this).val());
            if (url == '') {
                totalTeamDom.val("");
                groupConfigDiv.addClass("layui-hide");
                clearGroupConfig();
                return false;
            }
            if (!new RegExp("^https://fantasy.premierleague.com/leagues/.*/standings/[c|h]$").test(url)) {
                layer.msg('联赛url格式错误，请重试', {time: 1500});
                $(this).val('');
                totalTeamDom.val("");
                groupConfigDiv.addClass("layui-hide");
                clearGroupConfig();
                return false;
            }
            // 展示加载层
            let loadIndex = layer.load(1);
            // 计算联赛队伍数量
            axios.get('/tournament/countTournamentLeagueTeams', {
                params: {
                    url: url
                }
            })
                .then(function (response) {
                    layer.close(loadIndex);
                    let totalTeam = response;
                    if (totalTeam == 0) {
                        layer.msg('联赛队伍总数为0，请重新填写官方联赛url', {time: 1500});
                        $(this).val('');
                        totalTeamDom.html("");
                        groupConfigDiv.addClass("layui-hide");
                        return false;
                    }
                    totalTeamDom.html("队伍总数：" + totalTeam);
                    groupConfigDiv.removeClass("layui-hide");
                })
                .catch(function (error) {
                    layer.close(loadIndex);
                    console.info(error.message);
                    layer.msg("联赛url读取错误，请重试", {time: 1500});
                    $(this).val('');
                    totalTeamDom.val("");
                    groupConfigDiv.addClass("layui-hide");
                    clearGroupConfig();
                });
        });

        /**
         * 监听赛事名称输入框：失去焦点
         * 1.校验赛事名称
         * 2.查询是否重复
         *
         * @author tong 2020.08.13
         */
        $("input[name=tournamentName]").on('focusout', function () {
            let nameTipsIconDiv = $("#nameTipsIcon");
            let tournamentNameDom = $("input[name=tournamentName]");
            // 校验赛事名称
            let name = $(this).val();
            if (name == '') {
                nameTipsIconDiv.addClass("layui-hide");
                return false;
            }
            // 查询是否重复
            axios.get('/tournament/checkTournamentName', {
                params: {
                    name: name
                }
            })
                .then(function (response) {
                    if (response == "true") {
                        nameTipsIconDiv.removeClass("layui-hide");
                    } else if (response == "false") {
                        layer.msg("赛事名称已存在，请更换", {time: 1500});
                        nameTipsIconDiv.addClass("layui-hide");
                        tournamentNameDom.val('');
                    }
                })
                .catch(function (error) {
                    console.info(error.message);
                    layer.msg("赛事名称查询错误，请重试", {time: 1500});
                    tournamentNameDom.val('');
                });
        });

        /**
         * 监听小组赛模式下拉框：下拉
         * 1.清除淘汰赛配置
         * 2.展示小组赛配置
         * 3.根据小组赛模式：
         * a.无小组赛时：A.隐藏小组赛配置；B.去除必选属性；C.不能无淘汰赛；
         * b.积分赛时：A.展示小组赛配置；B.增加必选属性；C平均分开关可操作；
         * c.对阵赛时：A.展示小组赛配置；B.增加必选属性；C平均分开关可操作；
         * c.请选择时：A.隐藏淘汰赛配置；B.隐藏并重置小组赛配置
         * 4.再次触发淘汰赛选择
         *
         * @author tong 2020.08.13
         */
        form.on('select(groupMode)', function (data) {
            // div
            let knockoutConfigDiv = $("#knockoutConfig");
            // dom
            let knockoutModeDom = $("select[name=knockoutMode]");
            let groupFillAverageDom = $("input[name=groupFillAverage]");
            let fillAverageTipsDom = $("#fillAverageTips");
            let groupTeamsPerGroupDom = $("input[name=groupTeamsPerGroup]");
            // val
            let groupMode = data.value;
            let knockoutMode = knockoutModeDom.val();
            // 展示淘汰赛设置
            knockoutConfigDiv.removeClass("layui-hide");
            // 小组赛模式
            switch (groupMode) {
                case "0": { // 无小组赛
                    // 隐藏小组赛设置
                    hideGroupConfig();
                    // 去除必选属性
                    removeGroupRequired();
                    // 不能无淘汰赛
                    if (knockoutMode == "0") {
                        layer.msg("没有小组赛又没有淘汰赛还弄个啥", {icon: 5, time: 1000});
                    }
                    break;
                }
                case "1": { // 积分赛
                    // 展示小组赛设置
                    showGroupConfig(groupMode);
                    // 增加必选属性
                    addGroupRequired();
                    // 平均分开关可操作
                    groupFillAverageDom.removeAttr("disabled");
                    fillAverageTipsDom.text("");
                    // 触发小组队伍数量事件
                    groupTeamsPerGroupDom.trigger('focusout');
                    break;
                }
                case "2": { // 对阵赛
                    // 展示小组赛设置
                    showGroupConfig(groupMode);
                    // 增加必选属性
                    addGroupRequired();
                    // 平均分开关不可操作
                    groupFillAverageDom.attr("disabled", "");
                    fillAverageTipsDom.text("");
                    // 触发小组队伍数量事件
                    groupTeamsPerGroupDom.trigger('focusout');
                    break;
                }
                default: { // 请选择
                    // 隐藏淘汰赛配置
                    knockoutConfigDiv.addClass("layui-hide");
                    // 隐藏小组赛配置
                    hideGroupConfig();
                    // 重置小组赛配置
                    clearGroupConfig();
                }
            }
            // 再次触发淘汰赛选择
            knockoutModeDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='" + knockoutMode + "']").click();
        });

        /**
         * 监听小组赛开始时间下拉框：下拉
         * 1.校验开始时间
         *
         * @author tong 2020.08.13
         */
        form.on('select(groupStartGw)', function (data) {
            let groupStartGw = getGwValue(data.value);
            if (groupStartGw == '') {
                return false;
            }
            // 校验开始时间
            let groupEndGw = getGwValue($("select[name=groupEndGw]").val());
            if (groupEndGw != '' && groupStartGw >= groupEndGw) {
                layer.msg("开始时间必须早于结束时间！", {time: 1500});
                $("select[name=groupStartGw]").val('0');
            }
        });

        /**
         * groupEndGw -> (knockMode = "1" || "2")knockoutStartGw
         * 监听小组赛结束时间下拉框：下拉
         * 1.校验结束时间
         * 2.触发淘汰赛开始时间事件
         *
         * @author tong 2020.08.13
         */
        form.on('select(groupEndGw)', function (data) {
            let knockoutStartGwDom = $("input[name=knockoutStartGw]");
            // 校验结束时间
            let groupStartGw = getGwValue($("select[name=groupStartGw]").val());
            let groupEndGw = getGwValue(data.value);
            if (groupStartGw != '' && groupEndGw != '' && groupStartGw >= groupEndGw) {
                layer.msg("结束时间必须晚于开始时间！", {time: 1500});
                $("select[name=groupEndGw]").val('0');
            }
            // 触发淘汰赛开始时间事件
            let knockoutMode = $("select[name=knockoutMode]").val();
            if (knockoutMode == "1" || knockoutMode == "2") {
                knockoutStartGwDom.trigger('focusout');
            }
        });

        /**
         * groupTeamsPerGroup -> (knockMode = "1" || "2")knockoutTeams
         * 监听每组队伍数量输入框:失去焦点
         * 1.校验每组队伍数量
         * 2.校验是否允许切换加入平均分开关
         * 3.触发小组数量事件
         * 4.校验平均分开关：A.积分赛时，小组队伍数量一致时禁用开关，不一致时可手动选择；B.对阵赛时，小组队伍偶数禁用开关，奇数启用开关
         *
         * @author tong 2020.08.13
         */
        $("input[name=groupTeamsPerGroup]").on('focusout', function () {
            let groupNumDom = $("#groupNum");
            let groupFillAverageDom = $("input[name=groupFillAverage]");
            // 校验每组队伍数量
            let groupTeamsPerGroup = $(this).val();
            if (groupTeamsPerGroup == '') {
                clearGroupTeamsPerGroup();
                return false;
            }
            // 需为正整数
            if (parseInt(groupTeamsPerGroup) <= 0) {
                layer.msg("需为正整数", {time: 1500});
                clearGroupTeamsPerGroup();
                return false;
            }
            // 校验联赛队伍数量
            let totalTeam = getValueFromStr($("#totalTeam").html());
            if (parseInt(groupTeamsPerGroup) > parseInt(totalTeam)) {
                layer.msg("不能大于联赛队伍总数：" + totalTeam, {time: 1500});
                clearGroupTeamsPerGroup();
                return false;
            }
            // 校验每组出线队伍数量
            let groupQualifiers = $("input[name=groupQualifiers]").val();
            if (parseInt(groupQualifiers) > parseInt(groupTeamsPerGroup)) {
                layer.msg("不能大于每组队伍数量：" + groupTeamsPerGroup, {time: 1500});
                clearGroupTeamsPerGroup();
                return false;
            }
            // 校验是否允许切换加入平均分开关
            let groupMode = $("select[name=groupMode]").val();
            switch (groupMode) {
                case "1": {
                    if (totalTeam % groupTeamsPerGroup == 0) {
                        groupFillAverageDom.attr("disabled", "");
                        groupFillAverageDom.siblings("div.layui-form-switch").removeClass("layui-form-onswitch");
                        groupFillAverageDom.siblings("div.layui-form-switch").children("em").text("否");
                        $("#fillAverageTips").text("每个小组队伍数量已经一样，无需加入平均分");
                    } else {
                        groupFillAverageDom.removeAttr("disabled", "");
                        $("#fillAverageTips").text("  是否在小组内加入平均分average，使每个小组队伍数量一样");
                    }
                    break;
                }
                case "2": {
                    groupFillAverageDom.attr("disabled", "");
                    if (groupTeamsPerGroup % 2 == 0) {
                        groupFillAverageDom.siblings("div.layui-form-switch").removeClass("layui-form-onswitch");
                        groupFillAverageDom.siblings("div.layui-form-switch").children("em").text("否");
                        $("#fillAverageTips").text("每个小组队伍数量为偶数，无需加入平均分");
                    } else {
                        groupFillAverageDom.siblings("div.layui-form-switch").addClass("layui-form-onswitch");
                        groupFillAverageDom.siblings("div.layui-form-switch").children("em").text("是");
                        $("#fillAverageTips").text("每个小组队伍数量为奇数，自动加入平均分");
                    }
                    break;
                }
                default: {
                    groupFillAverageDom.removeAttr("disabled");
                }
            }
            // 计算小组数量
            let groupNum = Math.ceil(parseInt(totalTeam) / parseInt(groupTeamsPerGroup));
            groupNumDom.html("小组数量：" + groupNum);
            // 触发淘汰赛队伍事件
            $("input[name=knockoutRounds]").trigger('focusout');
        });

        /**
         * groupQualifiers -> knockoutTeams
         * 监听每组出线数量：失去焦点
         * tips：有每组出线数量，一定得是有淘汰赛
         * 1.校验每组出线数量
         * 2.展示淘汰赛轮次
         * 3.展示淘汰赛配置
         * 4.触发淘汰赛轮次事件
         *
         * @author tong 2020.08.13
         */
        $("input[name=groupQualifiers]").on('focusout', function () {
            let knockoutRoundsDom = $("input[name=knockoutRounds]");
            // 校验每组出线数量
            let groupQualifiers = $(this).val();
            if (groupQualifiers == '') {
                knockoutRoundsDom.trigger('focusout');
                return false;
            }
            // 需为正整数
            if (parseInt(groupQualifiers) <= 0) {
                layer.msg("小组出线数量需为正整数", {time: 1500});
                $(this).val('');
                knockoutRoundsDom.trigger('focusout');
                return false;
            }
            // 展示淘汰赛轮次
            $("#knockoutRounds").removeClass("layui-hide");
            $("#knockoutEvents").removeClass("layui-hide");
            // 隐藏淘汰赛开始时间下拉框
            $("#knockoutStartGwSelect").addClass("layui-hide");
            // 展示淘汰赛开始时间输入框和淘汰赛结束时间输入框
            $("#knockoutStartGw").removeClass("layui-hide");
            $("#knockoutEndGw").removeClass("layui-hide");
            // 触发淘汰赛队伍数量事件
            knockoutRoundsDom.trigger('focusout');
            // 校验每组队伍数量
            let groupTeamsPerGroup = $("input[name=groupTeamsPerGroup]").val();
            if (groupTeamsPerGroup == '' || parseInt(groupQualifiers) > parseInt(groupTeamsPerGroup)) {
                layer.msg("每组出线数量不能大于每组队伍数量：" + groupTeamsPerGroup, {time: 1500});
                $(this).val('');
                knockoutRoundsDom.trigger('focusout');
                return false;
            }
            // 触发淘汰赛队伍数量事件
            knockoutRoundsDom.trigger('focusout');
        });

        /**
         * 监听淘汰赛模式下拉框：下拉
         * 1.无淘汰赛时：a.重置淘汰赛配置；b.隐藏淘汰赛配置；c.不能无小组赛；d.有小组赛时，展示创建按钮
         * 2.有淘汰赛时：a.展示创建按钮；b.根据小组赛模式：A.无小组赛时：A1.展示淘汰赛开始时间下拉和结束时间；A2.触发淘汰赛队伍数量事件；B.有小组赛时：展示每组出线数量；c.触发淘汰赛轮次事件；
         * 3.请选择时：A.隐藏并重置淘汰赛配置；B.隐藏提交按钮
         *
         * @author tong 2020.08.13
         */
        form.on('select(knockoutMode)', function (data) {
            // div
            let createButtonDiv = $("#createButton");
            // dom
            let knockoutRoundsDom = $("input[name=knockoutRounds]");
            // val
            let groupMode = $("select[name=groupMode]").val();
            let knockoutMode = data.value;
            switch (knockoutMode) {
                case "0": { // 无淘汰赛
                    // 重置淘汰赛配置
                    clearKnockoutConfig();
                    // 隐藏淘汰赛配置
                    hideKnockoutConfig();
                    // 不能无小组赛
                    if (groupMode == "0") {
                        layer.msg("没有小组赛又没有淘汰赛还弄个啥", {icon: 5, time: 1000});
                        createButtonDiv.addClass("layui-hide");
                        return false;
                    }
                    // 有小组赛时，展示创建按钮
                    createButtonDiv.removeClass("layui-hide");
                    break;
                }
                case "1": // 单循环
                case "2": { // 主客场
                    // 展示创建按钮
                    createButtonDiv.removeClass("layui-hide");
                    // 根据小组赛模式
                    switch (groupMode) { // 无小组赛
                        case "0": {
                            // 展示淘汰赛轮次
                            $("#knockoutRounds").removeClass("layui-hide");
                            $("#knockoutEvents").removeClass("layui-hide");
                            // 隐藏淘汰赛开始时间输入框
                            $("#knockoutStartGw").addClass("layui-hide");
                            // 展示淘汰赛开始时间下拉框和淘汰赛结束时间输入框
                            $("#knockoutStartGwSelect").removeClass("layui-hide");
                            $("#knockoutEndGw").removeClass("layui-hide");
                            break;
                        }
                        case "1":
                        case "2": {
                            // 展示每组出线数量事件
                            $("#groupQualifiers").removeClass("layui-hide");
                            // 隐藏淘汰赛开始时间下拉框
                            $("#knockoutStartGwSelect").addClass("layui-hide");
                            // 展示淘汰赛开始时间输入框和淘汰赛结束时间输入框
                            $("#knockoutStartGw").removeClass("layui-hide");
                            $("#knockoutEndGw").removeClass("layui-hide");
                        }
                    }
                    // 触发淘汰赛轮次事件
                    knockoutRoundsDom.trigger("focusout");
                    break;
                }
                default: { // 请选择
                    // 隐藏淘汰赛配置
                    hideKnockoutConfig();
                    // 重置淘汰赛配置
                    clearKnockoutConfig();
                    // 隐藏提交按钮
                    createButtonDiv.addClass("layui-hide");
                }
            }
        });

        /**
         * knockoutStartGwSelect -> knockoutEndGw
         * 监听淘汰赛开始时间下拉框：下拉
         * tips：只有无小组赛且有淘汰赛时出现
         * 1.校验淘汰赛开始时间
         * 2.触发淘汰赛结束时间事件
         *
         * @author tong 2020.08.13
         */
        form.on('select(knockoutStartGwSelect)', function (data) {
            let knockoutEndGwDom = $("input[name=knockoutEndGw]");
            // 校验淘汰赛开始时间
            let knockoutStartGwSelect = getGwValue(data.value);
            if (knockoutStartGwSelect == '') {
                // 清空淘汰赛结束时间
                knockoutEndGwDom.val('');
                return false;
            }
            // 触发淘汰赛结束时间失去焦点事件
            knockoutEndGwDom.trigger('focusout');
        });

        /**
         * groupEndGw -> knockoutStartGw -> knockoutEndGw
         * 监听淘汰赛开始时间输入框（不可操作）：失去焦点
         * tips：只有既有小组赛又有淘汰赛时出现，由小组赛结束时间触发
         * 1.计算淘汰赛开始时间
         * 2.校验淘汰赛开始时间
         * 3.设置淘汰赛开始时间
         * 4.触发淘汰赛结束时间事件
         *
         * @author tong 2020.08.13
         */
        $("input[name=knockoutStartGw]").on('focusout', function () {
            let knockoutEndGwDom = $("input[name=knockoutEndGw]");
            // 计算淘汰赛开始时间
            let knockoutStartGw = '';
            let groupEndGw = getGwValue($("select[name=groupEndGw]").val());
            if (groupEndGw == '') {
                $(this).val('');
                knockoutEndGwDom.trigger('focusout');
            } else {
                knockoutStartGw = groupEndGw + 1;
            }
            // 校验淘汰赛开始时间
            if (knockoutStartGw > 38) {
                layer.msg("淘汰赛打不完啦，请修改小组赛结束时间", {time: 1500});
                clearGwRange();
                return false;
            }
            // 设置淘汰赛开始时间
            $(this).val(setGwStr(knockoutStartGw));
            // 触发淘汰赛结束时间事件
            knockoutEndGwDom.trigger('focusout');
        });

        /**
         * (knockoutStartGwSelect or knockoutStartGw) + knockoutRounds -> knockoutEvents -> knockoutEndGw
         * 监听淘汰赛结束时间输入框（不可操作）：失去焦点
         * 1.计算淘汰赛结束时间
         * 2.校验淘汰赛结束时间
         * 3.触发淘汰赛轮次失去焦点事件
         *
         * @author tong 2020.08.13
         */
        $("input[name=knockoutEndGw]").on('focusout', function () {
            // 计算淘汰赛结束时间
            let groupMode = $("select[name=groupMode]").val();
            let knockoutStartGw = getCurrentKnockoutStartGw(groupMode);
            let knockoutEvents = $("input[name=knockoutEvents]").val();
            let knockoutEndGw = '';
            if (knockoutStartGw != '' && knockoutEvents != '') {
                knockoutEndGw = knockoutStartGw + parseInt(knockoutEvents) - 1;
            }
            // 校验淘汰赛结束时间
            if (knockoutEndGw > 38) {
                if (groupMode == "0") {
                    let lastGw = 38 - knockoutEvents + 1;
                    layer.msg("淘汰赛打不完啦，淘汰赛开始时间最迟为GW" + lastGw, {time: 1500});
                } else if (groupMode == "1" || groupMode == "2") {
                    let lastGw = 38 - knockoutEvents;
                    layer.msg("淘汰赛打不完啦，小组赛结束时间最迟为GW" + lastGw, {time: 1500});
                }
                clearGwRange();
                return false;
            }
            // 设置淘汰赛结束时间
            $(this).val(setGwStr(knockoutEndGw));
        });

        /**
         * (knockoutMode = 0) or (groupQualifiers * groupNum) -> knockoutRounds -> knockoutEndGw
         * 监听淘汰赛队伍轮次输入框（不可操作）：失去焦点
         * 1.校验淘汰赛模式
         * 2.计算淘汰赛队伍数量
         * 3.计算淘汰赛轮次
         * 4.触发淘汰赛结束事件
         *
         * @author tong 2020.08.13
         */
        $("input[name=knockoutRounds]").on('focusout', function () {
            // 校验淘汰赛模式
            let knockoutTeamsDom = $("#knockoutTeams");
            let knockoutMode = $("select[name=knockoutMode]").val();
            if (knockoutMode != "1" && knockoutMode != "2") {
                $(this).val('');
                knockoutTeamsDom.html("");
                return false;
            }
            // 计算淘汰赛队伍数量
            let groupMode = $("select[name=groupMode]").val();
            let knockoutTeams = '';
            if (groupMode == "0") {
                knockoutTeams = getValueFromStr($("#totalTeam").html());
            } else if (groupMode == "1" || groupMode == "2") {
                let groupQualifiers = $("input[name=groupQualifiers]").val();
                let groupNum = getValueFromStr($("#groupNum").html());
                if (groupQualifiers != '' && groupNum != '') {
                    knockoutTeams = parseInt(groupQualifiers) * parseInt(groupNum);
                }
            }
            // 计算淘汰赛轮次
            let knockoutRounds = "";
            let knockoutEvents = "";
            if (knockoutTeams == '') {
                knockoutTeamsDom.html("");
            } else {
                knockoutRounds = Math.ceil(Math.log(parseInt(knockoutTeams)) / Math.log(2));
                knockoutEvents = Math.ceil(Math.log(parseInt(knockoutTeams)) / Math.log(2)) * parseInt(knockoutMode);
                knockoutTeamsDom.html("淘汰赛队伍：" + knockoutTeams);
            }
            $(this).val(knockoutRounds);
            $("input[name=knockoutEvents]").val(knockoutEvents);
            // 触发淘汰赛开始时间事件
            if (groupMode == "0") {
                let knockoutStartGwSelectDom = $("select[name=knockoutStartGwSelect]");
                let knockoutStartGwSelect = knockoutStartGwSelectDom.val();
                knockoutStartGwSelectDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='" + knockoutStartGwSelect + "']").click();
            } else if (groupMode == "1" || groupMode == "2") {
                $("input[name=knockoutStartGw]").trigger('focusout');
            }
        });

        /**
         * 监听表单提交
         *
         * @author 2020.08.13
         */
        form.on('submit(createTournament)', function (data) {
            let formData = data.field;
            // 设置参数
            let tournamentCreateData = {};
            tournamentCreateData.url = formData.url;
            tournamentCreateData.tournamentName = formData.tournamentName;
            tournamentCreateData.creator = formData.creator;
            tournamentCreateData.adminerEntry = formData.adminerEntry;
            tournamentCreateData.leagueType = formData.leagueType;
            tournamentCreateData.leagueId = formData.leagueId;
            tournamentCreateData.totalTeam = getValueFromStr($("#totalTeam").html());
            tournamentCreateData.groupMode = formData.groupMode;
            tournamentCreateData.teamsPerGroup = formData.groupTeamsPerGroup;
            tournamentCreateData.groupNum = getValueFromStr($("#groupNum").html());
            $("input[name=groupFillAverage]").siblings("div.layui-form-switch").children("em").text() == "是" ?
                tournamentCreateData.groupFillAverage = true : tournamentCreateData.groupFillAverage = false;
            tournamentCreateData.groupStartGw = getGwValue(formData.groupStartGw);
            tournamentCreateData.groupEndGw = getGwValue(formData.groupEndGw);
            tournamentCreateData.groupQualifiers = formData.groupQualifiers;
            tournamentCreateData.knockoutMode = formData.knockoutMode;
            tournamentCreateData.knockoutTeam = getValueFromStr($("#knockoutTeams").html());
            tournamentCreateData.knockoutRounds = formData.knockoutRounds;
            tournamentCreateData.knockoutEvents = formData.knockoutEvents;
            tournamentCreateData.knockoutStartGw = getActiveKnockoutStartGw();
            tournamentCreateData.knockoutEndGw = getGwValue(formData.knockoutEndGw);
            // 禁用提交按钮
            $(this).attr("disabled", "");
            // 提交到接口
            layer.confirm("确认创建？", {closeBtn: 0, title: ""}, function () {
                axios.post('/tournament/createNewTournament', tournamentCreateData)
                    .then(function (response) {
                        layer.msg(response, {icon: 6, time: 1500}, function () {
                            window.location.replace("/tournament/create");
                        });
                    })
                    .catch(function (error) {
                        console.info(error.message);
                        layer.msg("创建失败，请重新尝试！", {icon: 2, time: 1500});
                    });
            }, function (index) {
                layer.close(index);
                return false;
            });
            $(this).removeAttr("disabled");
            return false;
        });

        // 浙江联赛

        $("input[name=zjTournamentName]").on('focusout', function () {
            let nameTipsIconDiv = $("#zjNameTipsIcon");
            // 校验赛事名称
            let name = $(this).val();
            if (name == '') {
                nameTipsIconDiv.addClass("layui-hide");
                return false;
            }
            // 查询是否重复
            axios.get('/tournament/checkTournamentName', {
                params: {
                    name: name
                }
            })
                .then(function (response) {
                    if (response == "true") {
                        nameTipsIconDiv.removeClass("layui-hide");
                    } else if (response == "false") {
                        layer.msg("赛事名称已存在，请更换", {time: 1500});
                        nameTipsIconDiv.addClass("layui-hide");
                        this.val('');
                    }
                })
                .catch(function (error) {
                    console.info(error.message);
                    layer.msg("赛事名称查询错误，请重试", {time: 1500});
                    this.val('');
                });
        });

        /**
         * 根据小组数量渲染表格
         *
         * @author tong 2020.09.30
         */
        let zjGroupNum = parseInt($("input[name=zjGroupNum]").val());
        for (let i = 1; i < zjGroupNum + 1; i++) {
            // 回填组名
            let groupName = getCapitalLetterFromNum(i) + "组";
            $("#zjGroup" + i + "Name").text(groupName);
            // 展示
            $("#zjGroup" + i).removeClass("layui-hide");
            // 渲染
            let tableId = 'zjGroup' + i + 'Table';
            table.init(tableId, {
                done: function () {
                    soulTable.render(this);
                }
            });
            // 监听编辑
            table.on('edit(' + tableId + ')', function (obj) {
                let entry = obj.data.entry;
                if (!new RegExp("^[1-9]\\d*$").test(entry)) {
                    layer.msg('team_id需为正整数', {time: 1000});
                    $(this).val('');
                    return false;
                }
                axios.get('/tournament/qryEntryInfo?entry=' + entry)
                    .then(function (response) {
                        obj.update({
                            entryName: response.entryName,
                            playerName: response.playerName
                        });
                    })
                    .catch(function (error) {
                        console.info(error.message);
                    });
            });
            // 监听开关
            form.on('switch(captainSwitch)', function (obj) {
                layer.tips(this.value + ' ' + this.name + '：' + obj.elem.checked, obj.othis);
            });
        }

        /**
         * 监听分数数量输入框：失去焦点 -> 重载赛事分组表格
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjGroupNum]").on('focusout', function () {
            let zjOldGroupNum = $("#zjGroupNum").text();
            let zjGroupNum = $(this).val();
            let zjGroupNumValue = parseInt(zjGroupNum);
            if (zjGroupNum == '') {
                layer.msg('分组数量不能为空！', {time: 1000});
                $(this).val(zjOldGroupNum);
                return false;
            }
            if (zjGroupNumValue <= 1) {
                layer.msg('分组数量必须大于1！', {time: 1000});
                $(this).val(zjOldGroupNum);
                return false;
            }
            if (zjGroupNum == zjOldGroupNum) {
                layer.msg('分组数量没有改变！', {time: 1000});
                return false;
            }
            let zjTeamPerGroupValue = parseInt($("input[name=zjTeamPerGroup]").val());
            window.location.replace('/tournament/create/reload?zjGroupNum=' + zjGroupNumValue + '&zjTeamPerGroup=' + zjTeamPerGroupValue);
        });

        /**
         * 监听每组队伍输入框：失去焦点 -> 重载赛事分组表格
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjTeamPerGroup]").on('focusout', function () {
            let zjOldTeamPerGroup = $("#zjTeamPerGroup").text();
            let zjTeamPerGroup = $(this).val();
            let zjTeamPerGroupValue = parseInt(zjTeamPerGroup);
            if (zjTeamPerGroup == '') {
                layer.msg('分组队伍数量没有改变！', {time: 1000});
                $(this).val(zjOldTeamPerGroup);
                return false;
            }
            if (zjTeamPerGroupValue <= 1) {
                layer.msg('分组队伍数量必须大于1！', {time: 1000});
                $(this).val(zjOldTeamPerGroup);
                return false;
            }
            if (zjTeamPerGroup == zjOldTeamPerGroup) {
                layer.msg('分组队伍数量没有改变！', {time: 1000});
                return false;
            }
            let zjGroupNumValue = parseInt($("input[name=zjGroupNum]").val());
            window.location.replace('/tournament/create/reload?zjGroupNum=' + zjGroupNumValue + '&zjTeamPerGroup=' + zjTeamPerGroupValue);
        });

        /**
         * 监听积分赛轮次输入框：失去焦点 -> 触发积分赛开始时间下拉框点击
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjPointsRound]").on('focusout', function () {
            let zjPointsStartGwDom = $("select[name=zjPointsStartGw]");
            zjPointsStartGwDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='" + zjPointsStartGwDom.val() + "']").click();
        });

        /**
         * 监听积分赛开始时间下拉框：失去焦点 -> 触发积分赛结束时间输入框失去焦点
         *
         * @author tong 2020.09.30
         */
        form.on('select(zjPointsStartGw)', function () {
            $("input[name=zjPointsEndGw]").trigger('focusout');
        });

        /**
         * 监听积分赛结束时间输入框：失去焦点 -> 计算积分赛结束时间
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjPointsEndGw]").on('focusout', function () {
            let zjBattleRoundDom = $("input[name=zjBattleRound]");
            let zjPointsRound = $("input[name=zjPointsRound]").val();
            let zjPointsStartGw = $("select[name=zjPointsStartGw]").val();
            if (zjPointsRound == '' || zjPointsStartGw == '') {
                $(this).val('');
                return false;
            }
            // 计算积分赛结束时间
            let zjPointsEndGwValue = parseInt(zjPointsRound) + parseInt(zjPointsStartGw) - 1;
            if (zjPointsEndGwValue > 38) {
                layer.msg("积分赛打不完啦", {time: 1500});
                clearZjTournamentTime();
                zjBattleRoundDom.trigger('focusout');
                return false;
            }
            $(this).val(setGwStr(zjPointsEndGwValue));
            zjBattleRoundDom.trigger('focusout');
        });

        /**
         * 监听对阵赛轮次输入框：失去焦点 -> 触发对阵赛开始时间输入框失去焦点
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjBattleRound]").on('focusout', function () {
            $("input[name=zjBattleStartGw]").trigger('focusout');
        });

        /**
         * 监听对阵赛开始时间输入框：失去焦点 -> 计算对阵赛开始时间；触发对阵赛结束时间输入框失去焦点
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjBattleStartGw]").on('focusout', function () {
            let zjBattleEndGwDom = $("input[name=zjBattleEndGw]");
            let zjPointsEndGw = $("input[name=zjPointsEndGw]").val();
            if (zjPointsEndGw == '') {
                $(this).val('');
                return false;
            }
            let zjBattleStartGw = getGwValue(zjPointsEndGw) + 1;
            if (zjBattleStartGw > 38) {
                layer.msg("对阵赛打不完啦", {time: 1500});
                clearZjTournamentTime();
                zjBattleEndGwDom.trigger('focusout');
                return false;
            }
            $(this).val(setGwStr(zjBattleStartGw));
            zjBattleEndGwDom.trigger('focusout');
        });

        /**
         * 监听对阵赛结束时间输入框：失去焦点 -> 计算对阵赛结束时间
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjBattleEndGw]").on('focusout', function () {
            let zjPkRoundDom = $("input[name=zjPkRound]");
            let zjBattleRound = $("input[name=zjBattleRound]").val();
            let zjBattleStartGw = $("input[name=zjBattleStartGw]").val();
            if (zjBattleRound == '' || zjBattleStartGw == '') {
                $(this).val('');
                return false;
            }
            let zjBattleEndGwValue = parseInt(zjBattleRound) + getGwValue(zjBattleStartGw) - 1;
            if (zjBattleEndGwValue > 38) {
                layer.msg("对阵赛打不完啦", {time: 1500});
                clearZjTournamentTime();
                zjPkRoundDom.trigger('focusout');
                return false;
            }
            $(this).val(setGwStr(zjBattleEndGwValue));
            zjPkRoundDom.trigger('focusout');
        });

        /**
         * 监听PK赛轮次输入框：失去焦点 -> 触发PK开始时间输入框失去焦点
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjPkRound]").on('focusout', function () {
            $("input[name=zjPkStartGw]").trigger('focusout');
        });

        /**
         * 监听PK赛开始时间输入框：失去焦点 -> 计算Pk赛开始时间；触发PK赛结束时间输入框失去焦点
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjPkStartGw]").on('focusout', function () {
            let zjPkEndGwDom = $("input[name=zjPkEndGw]");
            let zjBattleEndGw = $("input[name=zjBattleEndGw]").val();
            if (zjBattleEndGw == '') {
                return false;
            }
            let zjPkStartGw = getGwValue(zjBattleEndGw) + 1;
            if (zjPkStartGw > 38) {
                layer.msg("PK赛打不完啦", {time: 1500});
                clearZjTournamentTime();
                zjPkEndGwDom.trigger('focusout');
                return false;
            }
            $(this).val(setGwStr(zjPkStartGw));
            zjPkEndGwDom.trigger('focusout');
        });

        /**
         * 监听PK赛结束时间输入框：失去焦点 -> 计算PK赛结束时间
         *
         * @author tong 2020.09.30
         */
        $("input[name=zjPkEndGw]").on('focusout', function () {
            let zjPkRound = $("input[name=zjPkRound]").val();
            let zjPkStartGw = $("input[name=zjPkStartGw]").val();
            if (zjPkRound == '' || zjPkStartGw == '') {
                $(this).val('');
                return false;
            }
            let zjPkEndGwValue = parseInt(zjPkRound) + getGwValue(zjPkStartGw) - 1;
            if (zjPkEndGwValue > 38) {
                layer.msg("PK赛打不完啦", {time: 1500});
                clearZjTournamentTime();
                return false;
            }
            $(this).val(setGwStr(zjPkEndGwValue));
        });

        /**
         * 提交
         *
         * @author tong 2020.09.30
         */
        form.on('submit(createZjTournament)', function (data) {
            let formData = data.field;
            let commit = true;
            let groupDataList = [];
            for (let i = 1; i < zjGroupNum + 1; i++) {
                let zjTournamentGroupData = {};
                let groupEntryList = [];
                let tableId = 'zjGroup' + i + 'Table';
                $.each(table.cache[tableId], function (index, item) {
                    let entry = item.entry;
                    if (entry == '' || entry <= 0) {
                        layer.msg('小组还有坑位没分配，不能创建', {time: 1000});
                        commit = false;
                        return false;
                    }
                    groupEntryList.push(entry);
                });
                zjTournamentGroupData.groupId = i;
                zjTournamentGroupData.groupEntryList = groupEntryList;
                groupDataList.push(zjTournamentGroupData);
            }
            if (commit == false) {
                return false;
            }
            let zjTournamentCreateData = {};
            zjTournamentCreateData.tournamentName = formData.zjTournamentName;
            zjTournamentCreateData.adminerEntry = formData.zjAdminerEntry;
            zjTournamentCreateData.creator = formData.zjCreator;
            zjTournamentCreateData.totalTeam = parseInt($("#zjGroupNum").text()) * parseInt($("#zjTeamPerGroup").text());
            zjTournamentCreateData.pointsRound = formData.zjPointsRound;
            zjTournamentCreateData.pointsStartGw = getGwValue(formData.zjPointsStartGw);
            zjTournamentCreateData.pointsEndGw = getGwValue(formData.zjPointsEndGw);
            zjTournamentCreateData.battleRound = formData.zjBattleRound;
            zjTournamentCreateData.battleStartGw = getGwValue(formData.zjBattleStartGw);
            zjTournamentCreateData.battleEndGw = getGwValue(formData.zjBattleEndGw);
            zjTournamentCreateData.pkRound = formData.zjPkRound;
            zjTournamentCreateData.pkStartGw = getGwValue(formData.zjPkStartGw);
            zjTournamentCreateData.pkEndGw = getGwValue(formData.zjPkEndGw);
            zjTournamentCreateData.groupDataList = groupDataList;
            // 禁用提交按钮
            $(this).attr("disabled", "");
            // 提交到接口
            layer.confirm("确认创建？", {closeBtn: 0, title: ""}, function () {
                // axios.post('/tournament/createNewZjTournament', zjTournamentCreateData)
                //     .then(function (response) {
                //         layer.msg(response, {icon: 6, time: 1500}, function () {
                //             window.location.replace("/tournament/create");
                //         });
                //     })
                //     .catch(function (error) {
                //         console.info(error.message);
                //         layer.msg("创建失败，请重新尝试！", {icon: 2, time: 1500});
                //     });
            }, function (index) {
                layer.close(index);
                return false;
            });
            $(this).removeAttr("disabled");
            return false;
        });

    });
</script>

<script>

    function formatUrl(url) {
        url = url.trim();
        if (url.indexOf("https") != 0) {
            url = "https" + url;
        }
        return url;
    }

    function getGwValue(gwStr) {
        if (gwStr == '') {
            return '';
        }
        if (gwStr.indexOf("GW") == 0) {
            gwStr = gwStr.substr(2, gwStr.length);
        }
        return parseInt(gwStr);
    }

    function setGwStr(value) {
        if (value == '') {
            return '';
        }
        return "GW" + value;
    }

    function hideGroupConfig() {
        let $ = layui.jquery;
        $("#groupGw").addClass("layui-hide");
        $("#groupTeamsPerGroup").addClass("layui-hide");
        $("#groupFillAverage").addClass("layui-hide");
        $("#groupQualifiers").addClass("layui-hide");

    }

    function removeGroupRequired() {
        let $ = layui.jquery;
        $("input[name=groupTeamsPerGroup]").removeAttr("lay-verify");
        $("select[name=groupStartGw]").removeAttr("lay-verify");
        $("select[name=groupEndGw]").removeAttr("lay-verify");
    }

    function showGroupConfig(groupMode) {
        let $ = layui.jquery;
        $("#groupGw").removeClass("layui-hide");
        $("#groupTeamsPerGroup").removeClass("layui-hide");
        if (groupMode == "1" || groupMode == "2") {
            $("#groupFillAverage").removeClass("layui-hide");
        } else {
            $("#groupFillAverage").addClass("layui-hide");
        }
    }

    function addGroupRequired() {
        let $ = layui.jquery;
        $("input[name=groupTeamsPerGroup]").attr("lay-verify", "required");
        $("select[name=groupStartGw]").attr("lay-verify", "required");
        $("select[name=groupEndGw]").attr("lay-verify", "required");
    }

    function hideKnockoutConfig() {
        let $ = layui.jquery;
        $("#groupQualifiers").addClass("layui-hide");
        $("#knockoutStartGwSelect").addClass("layui-hide");
        $("#knockoutStartGw").addClass("layui-hide");
        $("#knockoutEndGw").addClass("layui-hide");
        $("#knockoutRounds").addClass("layui-hide");
        $("#knockoutEvents").addClass("layui-hide");
    }

    function clearGroupConfig() {
        let $ = layui.jquery;
        $("select[name=groupStartGw]").val('0');
        $("select[name=groupEndGw]").val('0');
        $("input[name=groupTeamsPerGroup]").val('');
        $("input[name=groupQualifiers]").val('');
    }

    function clearKnockoutConfig() {
        let $ = layui.jquery;
        $("select[name=knockoutStartGwSelect]").val('0');
        $("input[name=knockoutStartGw]").val('');
        $("input[name=knockoutEndGw]").val('');
    }

    function getCurrentKnockoutStartGw(groupMode) {
        let $ = layui.jquery;
        if (groupMode == "0") {
            return getGwValue($("select[name=knockoutStartGwSelect]").val());
        } else if (groupMode == "1" || groupMode == "2") {
            return getGwValue($("input[name=knockoutStartGw]").val());
        }
        return '';
    }

    function getActiveKnockoutStartGw() {
        let $ = layui.jquery;
        let knockoutStartGw = $("select[name=knockoutStartGwSelect]").val();
        if (knockoutStartGw == null || knockoutStartGw == '') {
            knockoutStartGw = $("input[name=knockoutStartGw]").val();
        }
        return getGwValue(knockoutStartGw);
    }

    function clearGwRange() {
        let $ = layui.jquery;
        $("select[name=groupEndGw]").val('0');
        $("select[name=knockoutStartGwSelect]").val('0');
        $("input[name=knockoutStartGw]").val('');
        $("input[name=knockoutEndGw]").val('');
    }

    function clearGroupTeamsPerGroup() {
        let $ = layui.jquery;
        $("input[name=groupTeamsPerGroup]").val('');
        $("#groupNum").html("");
        $("input[name=knockoutRounds]").trigger('focusout');
    }

    function getValueFromStr(str) {
        return str.substr(str.indexOf("：") + 1, str.length);
    }

    function clearZjTournamentTime() {
        let $ = layui.jquery;
        // points_round
        $("input[name=zjPointsRound]").val('');
        $("select[name=zjPointsStartGw]").val('0');
        $("input[name=zjPointsEndGw]").val('');
        // battle_round
        $("input[name=zjBattleRound]").val('');
        $("input[name=zjBattleStartGw]").val('');
        $("input[name=zjBattleEndGw]").val('');
        // pk
        $("input[name=zjPkRound]").val('');
        $("input[name=zjPkStartGw]").val('');
        $("input[name=zjPkEndGw]").val('');
    }

</script>

</html>
