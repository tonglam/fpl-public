<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout::header(~{::title},~{::link})">
    <title>test-letletme</title>
    <link rel="stylesheet" th:href="@{/css/test.css}"/>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content">

            <h1 style="font-size: 28px">test</h1>

            <div style="margin-top: 20px"></div>

            <div class="pitch">
                <ol class="container" id="attack">
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="'/img/jersey/'+${name}+'.png'">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                </ol>
                <ol class="container" id="midfield">
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                </ol>
                <ol class="container" id="defence">
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                </ol>
                <ul class="container" id="goal">
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                </ul>
            </div>

            <div class="bench">
                <ul class="container" id="subs">
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                    <li>
                        <img src="" style="width: 50px;height: 50px" th:src="@{/img/jersey/SOU.png}">
                        <span class="name">McCarthy</span>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

</body>

<script th:replace="layout::baseScript"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dragula/3.7.1/dragula.min.js"></script>

<script th:inline="none">

    let drake = dragula({
        containers: [
            document.querySelector('#defence'), document.querySelector('#midfield'), document.querySelector('#attack'), document.querySelector('#subs')
        ],
        revertOnSpill: true,
        mirrorContainer: document.body,
        ignoreInputTextSelection: true
    });

    // validation
    drake.on('drop', function (el, target, source) {

        // max 11 players
        if (target.id !== 'subs' && document.querySelectorAll('.pitch li').length > 11) {
            drake.cancel();
        }

        // max 4 subs
        if (target.id === 'subs' && document.querySelectorAll('.bench li').length > 4) {
            drake.cancel();
        }

        // defender -> 3-5
        if (source.id === 'defence' && source.children.length < 3) {
            drake.cancel();
        }
        if (target.id === 'defence' && target.children.length > 5) {
            drake.cancel();
        }

        // midfielder -> 2-5
        if (source.id === 'midfield' && source.children.length < 2) {
            drake.cancel();
        }
        if (target.id === 'midfield' && target.children.length > 5) {
            drake.cancel();
        }

        // attacker 1-3
        if (source.id === 'attack' && source.children.length < 1) {
            drake.cancel();
        }
        if (target.id === 'attack' && target.children.length > 3) {
            drake.cancel();
        }

    }).on('remove', function () {
        darke.remove();
    })

</script>


</html>
