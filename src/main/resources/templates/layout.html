<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

    <title th:replace="${title}"></title>

    <meta charset="utf-8">
    <meta content="webkit" name="renderer">

    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="telephone=no" name="format-detection">

    <link rel="stylesheet" th:href="@{/css/layout.css}"/>

    <script th:src="@{/layui/layui.js}"></script>
    <script th:src="@{/js/axios.min.js}"></script>

</head>

<body>

                    <dd><a href="/tournament/manage">管理赛事</a></dd>
                    <dd><a href="/tournament/result">查看赛果</a></dd>
                    <dd><a href="/tournament/rule" target="_blank">规则</a></dd>
                </dl>
            </li>
            <li class="layui-nav-item">
                <a href="javascript:void(0)">我的fpl</a>
                <dl class="layui-nav-child">
                    <dd><a href="/my_fpl/pick">阵容选择</a></dd>
                    <dd><a href="">得分查看</a></dd>
                    <dd><a href="">历史分析</a></dd>
                </dl>
            </li>
            <li class="layui-nav-item">
                <a href="javascript:void(0)">实时结果</a>
                <dl class="layui-nav-child">
                    <dd><a href="">实时得分</a></dd>
                    <dd><a href="">小联赛实时排名</a></dd>
                </dl>
            </li>
            <li class="layui-nav-item">
                <a href="javascript:void(0)">数据查询</a>
                <dl class="layui-nav-child">
                    <dd><a href="">比赛数据</a></dd>
                    <dd><a href="">球员数据</a></dd>

            <li class="nav-icon">
                <a class="layui-icon layui-icon-username" style="font-size: 25px;color: white"></a>
            </li>

            <li class="nav-teamId">
                <span style="margin-left: 5px">team_id:</span>
                <button class="layui-btn layui-badge" id="teamIdBtn" style="top:19px;text-align: center"
                        th:text="${session.entry}? ${session.entry} : '请输入id'" title="点击更换team_id"
                        type="button"></button>
            </li>
        </ul>

    </div>
</div>

<!-- footer -->
<div class="layui-footer footer footer-doc" th:fragment="footer">
    <div class="layui-main">
        <p>&copy; 2020 <a href="/" target="_blank">letletme.top</a></p>
        <p>
            <a href="http://beian.miit.gov.cn" rel="nofollow" target="_blank">粤ICP备20026680号</a>
        </p>
    </div>
</div>
</body>

<script th:fragment="baseScript" th:inline="javascript">
    layui.use(['element', 'layer'], function () {
        let $ = layui.jquery;
        $("#teamIdBtn").on('click', function () {
            let btn = $("#teamIdBtn");
            let index = layer.prompt({
                title: '更换team_id',
                offset: '100px',
                shade: 0.8,
                shadeClose: true,
                success: function (layero) {
                    // 回车
                    this.enterConfirm = function (event) {
                        if (event.keyCode === 13) {
                            $(".layui-layer-btn0").click();
                            return false;
                        }
                    };
                    // esc
                    this.escQuit = function (event) {
                        if (event.keyCode === 0x1B) {
                            layer.close(index);
                            return false;
                        }
                    }
                    $(document).on('keyup', this.enterConfirm);
                    $(document).on('keyup', this.escQuit);
                    // 确认按钮
                    $(".layui-layer-btn0").on("click", function () {
                        // 校验
                        let entry = layero.find("input").val();
                        if (entry == [[${entry}]]) {
                            layer.msg('team_id没有改变', {offset: '100px', shade: 0.8, shadeClose: true, time: 1500});
                            layer.close(index);
                            return false;
                        } else if (!new RegExp("^[1-9]\\d*$").test(entry)) {
                            layer.msg('team_id需为正整数', {offset: '100px', shade: 0.8, shadeClose: true, time: 1500});
                            layer.close(index);
                            return false;
                        }
                        // 保存
                        axios.get('/saveEntry?entry=' + entry)
                            .then(function () {
                                // 关闭
                                layer.msg('team_id更新成功', {
                                    offset: '100px',
                                    icon: 6,
                                    shade: 0.8,
                                    shadeClose: true,
                                    time: 1500
                                });
                                layer.close(index);
                                // 回填
                                btn.text(entry);
                            })
                            .catch(function (error) {
                                console.error(error);
                            });
                    })
                },
                end: function () {
                    $(document).off('keydown', this.enterConfirm);
                    $(document).off('keydown', this.escQuit);
                }
            });
        });
    });

    function getLocalTime(time) {
        let timezone = -480;
        let offsetGMT = new Date().getTimezoneOffset();
        let adjust = timezone - offsetGMT;
        let nowDate = time ? new Date(time).getTime() : new Date().getTime();
        return new Date(nowDate + adjust * 60 * 1000);
    }

    Date.prototype.format = function (fmt) {
        let o = {
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
            "q+": Math.floor((this.getMonth() + 3) / 3),
            "S": this.getMilliseconds()
        };
        if (/(y+)/.test(fmt)) {
            fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        }
        for (let k in o) {
            if (new RegExp("(" + k + ")").test(fmt)) {
                fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
            }
        }
        return fmt;
    }

</script>

</html>
