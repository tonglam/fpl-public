<script th:fragment="baseScript" th:inline="javascript">
    layui.config({
        base: 'static/layui/modules/',
        version: 'v1.5.17'
    }).extend({
        soulTable: '{/}https://cdn.jsdelivr.net/npm/layui-soul-table/docs/ext/soulTable',
        tableChild: '{/}https://cdn.jsdelivr.net/npm/layui-soul-table/docs/ext/tableChild',
        tableMerge: '{/}https://cdn.jsdelivr.net/npm/layui-soul-table/docs/ext/tableMerge',
        tableFilter: '{/}https://cdn.jsdelivr.net/npm/layui-soul-table/docs/ext/tableFilter',
        excel: '{/}https://cdn.jsdelivr.net/npm/layui-soul-table/docs/ext/excel'
    });

    layui.use(['element', 'layer'], function () {
        let $ = layui.jquery, layer = layui.layer;
        $("#teamIdBtn").on('click', function () {
            let btn = $("#teamIdBtn");
            let index = layer.prompt({
                title: '更新team_id',
                offset: '100px',
                shade: 0.8,
                shadeClose: true,
                success: function (layero) {
                    layer.setTop(layero);
                    // 回车
                    this.enterConfirm = function (event) {
                        if (event.keyCode === 13) {
                            $(".layui-layer-btn0").click();
                            return false;
                        }
                    };
                    // esc
                    this.escQuit = function (event) {
                        if (event.keyCode === 0x1B) {
                            layer.close(index);
                            return false;
                        }
                    }
                    $(document).on('keyup', this.enterConfirm);
                    $(document).on('keyup', this.escQuit);
                    // 确认按钮
                    $(".layui-layer-btn0").on("click", function () {
                        // 校验
                        let entry = layero.find("input").val();
                        if (entry == [[${entry}]]) {
                            layer.msg('team_id没有改变', {offset: '100px', shade: 0.8, shadeClose: true, time: 1500});
                            layer.close(index);
                            return false;
                        } else if (!new RegExp("^[1-9]\\d*$").test(entry)) {
                            layer.msg('team_id需为正整数', {offset: '100px', shade: 0.8, shadeClose: true, time: 1500});
                            layer.close(index);
                            return false;
                        }
                        // 保存
                        axios.get('/saveEntry?entry=' + entry)
                            .then(function () {
                                // 关闭
                                layer.msg('team_id更新成功', {
                                    offset: '100px',
                                    icon: 6,
                                    shade: 0.8,
                                    shadeClose: true,
                                    time: 1500
                                });
                                layer.close(index);
                                // 回填
                                btn.text(entry);
                                // 刷新
                                window.location.reload(true);
                            })
                            .catch(function (error) {
                                console.info(error.message);
                            });
                    })
                },
                end: function () {
                    $(document).off('keydown', this.enterConfirm);
                    $(document).off('keydown', this.escQuit);
                }
            });
        });
    });

    function getLocalTime(time) {
        let timezone = -480;
        let offsetGMT = new Date().getTimezoneOffset();
        let adjust = timezone - offsetGMT;
        let nowDate = time ? new Date(time).getTime() : new Date().getTime();
        return new Date(nowDate + adjust * 60 * 1000);
    }

    Date.prototype.format = function (fmt) {
        let o = {
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
            "q+": Math.floor((this.getMonth() + 3) / 3),
            "S": this.getMilliseconds()
        };
        if (/(y+)/.test(fmt)) {
            fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        }
        for (let k in o) {
            if (new RegExp("(" + k + ")").test(fmt)) {
                fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
            }
        }
        return fmt;
    }

    function getUrlParam(name) {
        let reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
        let r = window.location.search.substr(1).match(reg);
        if (r != null) return unescape(r[2]);
        return null;
    }

    function getCapitalLetterFromNum(num) {
        return String.fromCharCode(num + 64);
    }

</script>

<script th:fragment="entryInputLayer">
    layui.use(['layer'], function () {
        let $ = layui.jquery, layer = layui.layer;
        layer.ready(function () {
            if ($("button[name=teamIdBtn]").html() == "请输入id") {
                layer.prompt({
                    title: '请输入team_id',
                    offset: '100px',
                    shade: 0.8,
                    success: function (layero) {
                        layer.setTop(layero);
                        // 回车
                        this.enterConfirm = function (event) {
                            if (event.keyCode === 13) {
                                $(".layui-layer-btn0").click();
                                return false;
                            }
                        };
                        // esc
                        this.escQuit = function (event) {
                            if (event.keyCode === 0x1B) {
                                layer.close(index);
                                return false;
                            }
                        }
                        $(document).on('keyup', this.enterConfirm);
                        $(document).on('keyup', this.escQuit);
                        // 确认按钮
                        $(".layui-layer-btn0").on("click", function () {
                            // 校验
                            let entry = layero.find("input").val();
                            if (!new RegExp("^[1-9]\\d*$").test(entry)) {
                                layer.msg('team_id需为正整数', {
                                    offset: '100px',
                                    shade: 0,
                                    shadeClose: true,
                                    time: 1000
                                });
                                layero.find("input").val('');
                                return false;
                            }
                            // 保存
                            axios.get('/saveEntry?entry=' + entry)
                                .then(function () {
                                    layer.close();
                                    // 刷新
                                    window.location.reload();
                                })
                                .catch(function (error) {
                                    console.info(error.message);
                                });
                        })
                    },
                    end: function () {
                        $(document).off('keydown', this.enterConfirm);
                        $(document).off('keydown', this.escQuit);
                    }
                });
            }
        });
    });
</script>

</html>
