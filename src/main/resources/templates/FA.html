<!DOCTYPE html>
<html lang=zh-cmn-Hans xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width,initial-scale=1" name="viewport"/>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/css/style.css" rel="stylesheet" type="text/css"/>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/css/style.css" rel="stylesheet" type="text/css"/>
    <script src="/static/js/jquery-3.4.1.min.js" type="text/javascript"></script>
    <script src="/static/js/popper.js" type="text/javascript"></script>
    <script src="/static/js/bootstrap.min.js" type="text/javascript"></script>
    <script src="/static/js/bootstrap-table.js" type="text/javascript"></script>
    <script src="/static/js/bootstrap-table-zh-CN.js" type="text/javascript"></script>
    <title>FA</title>
</head>
<body>

<nav class="navbar navbar-inverse navbar-light navbar-dark">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="#">let let me</a>
        </div>
    </div>
</nav>

<div class="d-flex" id="wrapper">

    <!-- 侧边导航区 -->
    <div class="bg-light border-right" id="sidebar-wrapper">
        <ui class="list-group list-group-flush" style="list-style-type:none">
            <li class="list-group-item list-group-item-action bg-light">
                <a class="text-dark" data-toggle="collapse" href="#collapseOne"><strong>Ruselt</strong></a>
            </li>
            <li class="collapse show" id="collapseOne">
                <a class="list-group-item bg-light offset-sm-1 text-dark"
                   href="/FA/against"><strong>FA Cup</strong></a>
            </li>
        </ui>
    </div>

    <!-- 页面内容区 -->
    <div id="page-content-wrapper">
        <div class="container-fluid">
            <div class="row mb-2"></div>
            <div class="col-sm-8 align-middle text-center">
                <table class="table table-sm" id="FATable"></table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var columns = [{
            field: 'group_id',
            title: 'group',
            valign: 'middle',
            width: 50,
            cellStyle: function (value, row) {
                if (row.winner === row.entry) {
                    return {css: {"background-color": "red"}}
                } else {
                    return false;
                }
            }
        }, {
            field: 'team_name',
            title: 'team_name',
            valign: 'middle'
        }, {
            field: 'player_name',
            title: 'player_name',
            valign: 'middle'
        }, {
            field: 'round_1_point',
            title: 'round 1 (cost)',
            valign: 'middle',
            width: 80,
            cellStyle: function (value, row) {
                if (row.round_1_update == true) {
                    if (row.round_1_winner == row.entry) {
                        return {css: {"background-color": "red"}}
                    } else if (row.round_1_winner == -1) {
                        return {css: {"background-color": "grey"}}
                    } else {
                        return false;
                    }
                } else {
                    return false;
                }
            },
            formatter: function (value, row) {
                if (row.round_1_cost !== 0) {
                    return row.round_1_point + "(" + row.round_1_cost + ")";
                } else {
                    return row.round_1_point;
                }
            }
        }, {
            field: 'round_1_chip',
            title: 'round 1 chip',
            valign: 'middle',
            width: 80
        }, {
            field: 'round_2',
            title: 'round 2 (cost)',
            valign: 'middle',
            width: 80,
            cellStyle: function (value, row) {
                if (row.round_2_update == true) {
                    if (row.round_2_winner == row.entry) {
                        return {css: {"background-color": "red"}}
                    } else if (row.round_2_winner == -1) {
                        return {css: {"background-color": "grey"}}
                    } else {
                        return false;
                    }
                } else {
                    return false;
                }
            },
            formatter: function (value, row) {
                if (row.round_2_cost !== 0) {
                    return row.round_2_point + "(" + row.round_2_cost + ")";
                } else {
                    return row.round_2_point;
                }
            }
        }, {
            field: 'round_2_chip',
            title: 'round 2 chip',
            valign: 'middle',
            width: 80
        }, {
            field: 'overall_rank',
            title: 'overall_rank',
            valign: 'middle',
            width: 80
        }];
        $("#FATable").bootstrapTable('destroy');
        $('#FATable').bootstrapTable({
            cache: false,
            method: "get",
            contentType: "application/x-www-form-urlencoded",
            url: "/FA/getResult",
            striped: true,
            pagination: true,
            sortable: true,
            sortOrder: "asc",
            toolbar: "#toolbar",
            trimOnSearch: true,
            search: true,
            searchOnEnterKey: true,
            sidePagination: "client",
            pageNumber: 1,
            pageSize: 30,
            pageList: [30, 40, 50, 60, 80, 100],
            minimumCountColumns: 2,
            clickToSelect: true,
            uniqueId: "uuid",
            maintainSelected: true,
            columns: columns
        });
    </script>

</div>

</body>

</html>
