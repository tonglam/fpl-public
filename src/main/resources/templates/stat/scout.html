<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout::header(~{::title},~{})">
    <title>球探推荐-数据查询-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content">

            <div style="margin-top: 20px"></div>

            <h1 style="font-size: 28px">球探推荐</h1>

            <div class="layui-hide" id="nextGw" th:text="${nextGw}"></div>
            <div class="layui-hide" id="deadline" th:text="${deadline}"></div>

            <div style="margin-top: 30px"></div>

            <div class="layui-tab layui-tab-brief" lay-filter="checkTab">

                <ul class="layui-tab-title">
                    <li class="layui-this" lay-id="pick" th:text="'GW'+${nextGw}+'推荐'"></li>
                    <li class="" lay-id="result">推荐结果</li>
                </ul>

                <div class="layui-tab-content">

                    <div class="layui-tab-item layui-show">

                        <div style="margin-top: 20px"></div>

                        <fieldset class="layui-elem-field layui-field-title">
                            <legend th:text="'死线: (北京时间)'+${deadline}"></legend>
                        </fieldset>

                        <div class="layui-row">

                            <div class="layui-col-md4" style="margin-left: -50px;margin-top: 10px">

                                <form class="layui-form">

                                    <div class="layui-col-md-offset2" id="leftFund" style="font-size: 20px"></div>

                                    <div class="layui-hide" id="fund" th:text="${fund}"></div>

                                    <div style="margin-top: 30px"></div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">门将</label>
                                        <div class="layui-input-inline">
                                            <input class="layui-input" name="gkp"
                                                   th:value="${scoutEntryEventData?.gkpName}"
                                                   type="text">
                                        </div>
                                        <div class="layui-form-mid layui-word-aux" id="gkpPrice"
                                             th:text="${scoutEntryEventData?.gkpPrice}+'m'"></div>
                                    </div>
                                    <div class="layui-input layui-hide" id="gkpElement"
                                         th:value="${scoutEntryEventData?.gkp}"></div>

                                    <div style="margin-top: 30px"></div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">后卫</label>
                                        <div class="layui-input-inline">
                                            <input class="layui-input" name="def"
                                                   th:value="${scoutEntryEventData?.defName}"
                                                   readonly type="text">
                                        </div>
                                        <div class="layui-form-mid layui-word-aux" id="defPrice"
                                             th:text="${scoutEntryEventData?.defPrice}+'m'"></div>
                                    </div>
                                    <div class="layui-input layui-hide" id="defElement"
                                         th:value="${scoutEntryEventData?.def}"></div>

                                    <div style="margin-top: 30px"></div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">中场</label>
                                        <div class="layui-input-inline">
                                            <input class="layui-input" name="mid"
                                                   th:value="${scoutEntryEventData?.midName}"
                                                   readonly type="text">
                                        </div>
                                        <div class="layui-form-mid layui-word-aux" id="midPrice"
                                             th:text="${scoutEntryEventData?.midPrice}+'m'"></div>
                                    </div>
                                    <div class="layui-input layui-hide" id="midElement"
                                         th:value="${scoutEntryEventData?.mid}"></div>

                                    <div style="margin-top: 30px"></div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">前锋</label>
                                        <div class="layui-input-inline">
                                            <input class="layui-input" name="fwd"
                                                   th:value="${scoutEntryEventData?.fwdName}"
                                                   readonly type="text">
                                        </div>
                                        <div class="layui-form-mid layui-word-aux" id="fwdPrice"
                                             th:text="${scoutEntryEventData?.fwdPrice}+'m'"></div>
                                    </div>
                                    <div class="layui-input layui-hide" id="fwdElement"
                                         th:value="${scoutEntryEventData?.fwd}"></div>

                                    <div style="margin-top: 30px"></div>
                                    <div class="layui-form-item">
                                        <label class="layui-form-label">队长</label>
                                        <div class="layui-input-inline">
                                            <input class="layui-input" name="cap"
                                                   th:value="${scoutEntryEventData?.captainName}"
                                                   readonly type="text">
                                        </div>
                                    </div>
                                    <div class="layui-input layui-hide" id="capElement"
                                         th:value="${scoutEntryEventData?.captain}"></div>

                                    <div style="margin-top: 30px"></div>
                                    <div class="layui-form-item layui-form-text">
                                        <label class="layui-form-label">推荐理由</label>
                                        <div class="layui-input-block">
                                            <textarea class="layui-textarea" name="reason"
                                                      placeholder="这个人很懒什么都没有留下还不肯打标点"
                                                      th:value="${scoutEntryEventData?.reason}"></textarea>
                                        </div>
                                    </div>

                                    <div class="layui-form-item">
                                        <div class="layui-input-block">
                                            <button class="layui-btn" id="confirmButton" lay-filter="confirmButton"
                                                    lay-submit="confirmButton" type="button">提交
                                            </button>
                                            <button class="layui-btn" id="resetButton" lay-filter="confirmButton"
                                                    lay-submit="resetButton" type="button">重置
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>

                            <div class="layui-col-md7 layui-col-sm-offset1">
                                <table class="layui-table" id="playerTable" lay-filter="playerTable"></table>
                            </div>

                        </div>

                        <div style="margin-top: 20px"></div>

                        <div class="layui-hide" id="pickResult">

                            <fieldset class="layui-elem-field layui-field-title">
                                <legend>本轮推荐</legend>
                            </fieldset>

                            <div style="margin-top: 20px"></div>

                            <table class="layui-table" id="pickTable" lay-filter="pickTable"></table>

                        </div>

                    </div>

                    <div class="layui-tab-item">
                        <div style="margin-top: 20px"></div>
                        <div id="checkGw" style="font-size: 20px"></div>
                        <table class="layui-table" id="scoutTable" lay-filter="scoutTable"></table>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

</body>

<script th:replace="layout::baseScript"></script>

<script th:inline="javascript">
    layui.use(['layer'], function () {

        let $ = layui.jquery, layer = layui.layer, check = false, entry = [[${session.entry}]],
            scoutEntryList = [[${scoutEntryList}]];

        $.each(scoutEntryList, function (index, item) {
            if (entry === item) {
                check = true;
                let fund = numAdd(numAdd([[${scoutEntryEventData.gkpPrice}]], [[${scoutEntryEventData.defPrice}]]), numAdd([[${scoutEntryEventData.midPrice}]], [[${scoutEntryEventData.fwdPrice}]]));
                let leftFund = numSub([[${fund}]], fund);
                $("#leftFund").text("剩余资金：" + leftFund + "m");
                return false;
            }
        });

        if (check === false) {
            layer.msg("不是球探不让进！", {icon: 2, time: 1500}, function () {
                    layer.prompt({
                        title: '球探team_id',
                        offset: '100px',
                        shade: 0.8,
                        success: function (layero) {
                            layer.setTop(layero);
                            // 回车
                            this.enterConfirm = function (event) {
                                if (event.keyCode === 13) {
                                    $(".layui-layer-btn0").click();
                                    return false;
                                }
                            };
                            // esc
                            this.escQuit = function (event) {
                                if (event.keyCode === 0x1B) {
                                    layer.close(index);
                                    return false;
                                }
                            }
                            $(document).on('keyup', this.enterConfirm);
                            $(document).on('keyup', this.escQuit);
                            // 确认按钮
                            $(".layui-layer-btn0").on("click", function () {
                                // 校验
                                let entry = layero.find("input").val();
                                if (!new RegExp("^[1-9]\\d*$").test(entry)) {
                                    layer.msg('team_id需为正整数', {
                                        offset: '100px',
                                        shade: 0,
                                        shadeClose: true,
                                        time: 1000
                                    });
                                    layero.find("input").val('');
                                    return false;
                                }
                                // 保存
                                axios.get('/saveSession?key=entry&&value=' + entry)
                                    .then(function () {
                                        layer.close();
                                        // 刷新
                                        window.location.reload();
                                    })
                                    .catch(function (error) {
                                        console.info(error.message);
                                    });
                            });
                            $(".layui-layer-btn1").on("click", function () {
                                window.location.replace('/stat/scout');
                            })
                        },
                        cancel: function () {
                            window.location.reload('/stat/scout');
                        },
                        end: function () {
                            $(document).off('keydown', this.enterConfirm);
                            $(document).off('keydown', this.escQuit);
                        }
                    });
                }
            );
        }

    });
</script>

<script id="toolbar" type="text/html">
    <div class="layui-btn-container">
        <button class="layui-btn layui-btn-sm" lay-event="gkp">GKP</button>
        <button class="layui-btn layui-btn-sm" lay-event="def">DEF</button>
        <button class="layui-btn layui-btn-sm" lay-event="mid">MID</button>
        <button class="layui-btn layui-btn-sm" lay-event="fwd">FWD</button>
        <button class="layui-btn layui-btn-sm" lay-event="clear">清除筛选条件</button>
    </div>
</script>

<script id="checkToolbar" type="text/html">
    <button class="layui-btn layui-btn-sm" lay-filter="checkEvent" id="checkEvent"><span>查看时间</span><i
            class="layui-icon layui-icon-triangle-d"></i></button>
</script>

<script th:inline="none">
    layui.use(['element', 'table', 'layer', 'soulTable', 'dropdown'], function () {

        let $ = layui.jquery, element = layui.element, table = layui.table, soulTable = layui.soulTable,
            dropdown = layui.dropdown, loadIndex, nextGw = $("#nextGw").text(), deadline = $("#deadline").text();

        soulTable.config({
            drag: false,
            overflow: {
                type: 'tips',
                header: true,
                total: true
            }
        });

        $(document).ready(function () {
            loadIndex = layer.msg("加载中，请稍等", {time: false, scrollbar: false});

            axios.get('/stat/qryScoutPlayerList?elementType=0')
                .then(function (response) {
                    layer.close(loadIndex);
                    let data = response.data;
                    table.render({
                        elem: '#playerTable',
                        toolbar: '#toolbar',
                        defaultToolbar: false,
                        size: 'sm',
                        even: true,
                        data: data,
                        page: true,
                        width: 1032,
                        limit: 15,
                        limits: [15, 30, 50, 100],
                        cellMinWidth: 80,
                        contextmenu: {
                            body: [
                                {
                                    name: '选为队长',
                                    icon: 'layui-icon layui-icon-template',
                                    click: function (obj) {
                                        $("input[name=cap]").val(obj.row.webName);
                                        $("#capElement").val(obj.row.element);
                                    }
                                }
                            ]
                        },
                        cols: [[
                            {field: 'webName', title: '名字', align: 'center', width: 180, filter: true, rowspan: 2},
                            {
                                field: 'elementTypeName',
                                title: '位置',
                                align: 'center',
                                width: 80,
                                filter: true,
                                rowspan: 2
                            },
                            {field: 'teamShortName', title: '球队', align: 'center', width: 80, filter: true, rowspan: 2},
                            {
                                field: 'price',
                                title: '身价(m)',
                                align: 'center',
                                width: 90,
                                sort: true,
                                filter: true,
                                rowspan: 2
                            },
                            {
                                field: 'totalPoints',
                                title: '总分',
                                align: 'center',
                                width: 80,
                                sort: true,
                                filter: true,
                                rowspan: 2
                            },
                            {
                                field: 'selectedByPercent',
                                title: '持有率(%)',
                                align: 'center',
                                width: 100,
                                sort: true,
                                filter: true,
                                rowspan: 2
                            },
                            {
                                field: 'pointsPerGame',
                                title: '场均得分',
                                align: 'center',
                                width: 80,
                                rowspan: 2,
                            },
                            {field: '', title: '赛程', align: 'center', colspan: 3}
                        ],
                            [
                                {
                                    field: '',
                                    title: '',
                                    align: 'center',
                                    width: 110,
                                    templet: function (d) {
                                        return showDifficulty(d.againstTeam1ShortName, d.difficulty1, d.fixtureEvent1);
                                    }
                                },
                                {
                                    field: '',
                                    title: '',
                                    align: 'center',
                                    width: 110,
                                    templet: function (d) {
                                        return showDifficulty(d.againstTeam2ShortName, d.difficulty2, d.fixtureEvent2);
                                    }
                                },
                                {
                                    field: '',
                                    title: '',
                                    align: 'center',
                                    width: 110,
                                    templet: function (d) {
                                        return showDifficulty(d.againstTeam3ShortName, d.difficulty3, d.fixtureEvent3);
                                    }
                                }
                            ]
                        ],
                        id: 'playerTable',
                        filter: {
                            items: ['data', 'condition'],
                            bottom: false
                        },
                        done: function () {
                            soulTable.render(this);
                        }
                    });
                })
                .catch(function (error) {
                    layer.close(loadIndex);
                    console.info(error.message);
                });
        });

        table.on('toolbar(playerTable)', function (obj) {
            soulTable.clearFilter('playerTable');
            switch (obj.event) {
                case 'gkp': {
                    loadIndex = layer.msg("加载中，请稍等", {time: false, scrollbar: false});
                    axios.get('/stat/qryScoutPlayerList?elementType=1')
                        .then(function (response) {
                            layer.close(loadIndex);
                            let data = response.data;
                            table.reload('playerTable', {data: data});
                        })
                        .catch(function (error) {
                            layer.close(loadIndex);
                            console.info(error.message);
                        });
                    break;
                }
                case 'def': {
                    loadIndex = layer.msg("加载中，请稍等", {time: false, scrollbar: false});
                    axios.get('/stat/qryScoutPlayerList?elementType=2')
                        .then(function (response) {
                            layer.close(loadIndex);
                            let data = response.data;
                            table.reload('playerTable', {data: data});
                        })
                        .catch(function (error) {
                            layer.close(loadIndex);
                            console.info(error.message);
                        });
                    break;
                }
                case 'mid': {
                    loadIndex = layer.msg("加载中，请稍等", {time: false, scrollbar: false});
                    axios.get('/stat/qryScoutPlayerList?elementType=3')
                        .then(function (response) {
                            layer.close(loadIndex);
                            let data = response.data;
                            table.reload('playerTable', {data: data});
                        })
                        .catch(function (error) {
                            layer.close(loadIndex);
                            console.info(error.message);
                        });
                    break;
                }
                case 'fwd': {
                    loadIndex = layer.msg("加载中，请稍等", {time: false, scrollbar: false});
                    axios.get('/stat/qryScoutPlayerList?elementType=4')
                        .then(function (response) {
                            layer.close(loadIndex);
                            let data = response.data;
                            table.reload('playerTable', {data: data});
                        })
                        .catch(function (error) {
                            layer.close(loadIndex);
                            console.info(error.message);
                        });
                    break;
                }
                case 'clear': {
                    break;
                }
            }
        });

        table.on('row(playerTable)', function (obj) {
            let fundDom = $("#fund"), gkpPrice = $("#gkpPrice"), defPrice = $("#defPrice"), midPrice = $("#midPrice"),
                fwdPrice = $("#fwdPrice");
            let elementType = obj.data.elementType, element = obj.data.element, webName = obj.data.webName,
                value = parseFloat(obj.data.price), price = value + 'm';
            let fund = 0, leftFund = 0, gkpFund = 0, defFund = 0, midFund = 0, fwdFund = 0;
            if (fundDom.text() !== '') {
                fund = parseFloat(fundDom.text());
            }
            if (gkpPrice.text() !== '') {
                gkpFund = parseFloat(gkpPrice.text().slice(0, gkpPrice.text().indexOf('m')));
            }
            if (defPrice.text() !== '') {
                defFund = parseFloat(defPrice.text().slice(0, defPrice.text().indexOf('m')));
            }
            if (midPrice.text() !== '') {
                midFund = parseFloat(midPrice.text().slice(0, midPrice.text().indexOf('m')));
            }
            if (fwdPrice.text() !== '') {
                fwdFund = parseFloat(fwdPrice.text().slice(0, fwdPrice.text().indexOf('m')));
            }
            // 填位置
            switch (elementType) {
                case 1: {
                    leftFund = numSub(fund, (value + defFund + midFund + fwdFund));
                    if (leftFund < 0) {
                        layer.msg("钱不够啦！", {time: 1500});
                        return false;
                    }
                    $("input[name=gkp]").val(webName);
                    gkpPrice.text(price);
                    $("#gkpElement").val(element);
                    break;
                }
                case 2: {
                    leftFund = numSub(fund, (gkpFund + value + midFund + fwdFund));
                    if (leftFund < 0) {
                        layer.msg("钱不够啦！", {time: 1500});
                        return false;
                    }
                    $("input[name=def]").val(webName);
                    defPrice.text(price);
                    $("#defElement").val(element);
                    break;
                }
                case 3: {
                    leftFund = numSub(fund, (gkpFund + defFund + value + fwdFund));
                    if (leftFund < 0) {
                        layer.msg("钱不够啦！", {time: 1500});
                        return false;
                    }
                    $("input[name=mid]").val(webName);
                    midPrice.text(price);
                    $("#midElement").val(element);
                    break;
                }
                case 4: {
                    leftFund = numSub(fund, (gkpFund + defFund + midFund + value));
                    if (leftFund < 0) {
                        layer.msg("钱不够啦！", {time: 1500});
                        return false;
                    }
                    $("input[name=fwd]").val(webName);
                    fwdPrice.text(price);
                    $("#fwdElement").val(element);
                    break;
                }
                default:
                    return false;
            }
            // 计算剩余资金
            fund = fundDom.text();
            gkpFund = gkpPrice.text().slice(0, gkpPrice.text().indexOf('m'));
            defFund = defPrice.text().slice(0, defPrice.text().indexOf('m'));
            midFund = midPrice.text().slice(0, midPrice.text().indexOf('m'));
            fwdFund = fwdPrice.text().slice(0, fwdPrice.text().indexOf('m'));
            leftFund = numSub(fund, numAdd(numAdd(gkpFund, defFund), numAdd(midFund, fwdFund)));
            $("#leftFund").text('剩余资金:' + leftFund + 'm');
        });

        $("#confirmButton").on('click', function () {
            if (new Date().getTime() > getLocalTime(deadline)) {
                layer.msg("死线已过，提交不了！", {icon: 2, time: 1500});
                return false;
            }
            let data = {};
            data.gkp = $("#gkpElement").val();
            data.def = $("#defElement").val();
            data.mid = $("#midElement").val();
            data.fwd = $("#fwdElement").val();
            data.captain = $("#capElement").val();
            data.reason = $("textarea[name=reason]").val();
            // 禁用提交按钮
            $(this).attr("disabled", "");
            // 提交
            axios.post('/stat/upsertEventScout', data)
                .then(function () {
                    layer.msg('提交成功', {time: 1500});
                    window.location.replace("/stat/scout");
                })
                .catch(function (error) {
                    console.info(error.message);
                    $(this).removeAttr("disabled");
                });
        });

        $("#resetButton").on('click', function () {
            let fund = $("#fund").text();
            $("#leftFund").text('剩余资金:' + fund + 'm');
            // gkp
            $("input[name=gkp]").val('');
            $("#gkpPrice").text('');
            // def
            $("input[name=def]").val('');
            $("#defPrice").text('');
            // mid
            $("input[name=mid]").val('');
            $("#midPrice").text('');
            // fwd
            $("input[name=fwd]").val('');
            $("#fwdPrice").text('');
            // captain
            $("input[name=cap]").val('');
        });

        if (new Date().getTime() > getLocalTime(deadline)) {
            $("#pickResult").removeClass("layui-hide");
            table.render({
                elem: '#pickTable',
                even: true,
                url: '/stat/qryEventScoutPickList',
                where: {event: parseInt(nextGw) - 1},
                width: 800,
                cellMinWidth: 120,
                cols: [[
                    {field: 'scoutName', title: '球探', align: 'center', width: 200},
                    {field: 'gkpName', title: '门将', align: 'center'},
                    {field: 'defName', title: '后卫', align: 'center'},
                    {field: 'midName', title: '中场', align: 'center'},
                    {field: 'fwdName', title: '前锋', align: 'center'},
                    {field: 'captainName', title: '队长', align: 'center'},
                ]],
                initSort: {
                    field: 'scoutName',
                    type: 'asc'
                },
                id: 'pickTable',
                done: function () {
                    soulTable.render(this);
                }
            });
        }

        element.on('tab(checkTab)', function (data) {
            if (data.index === 1) {
                // 当前周
                $("#checkGw").text('GW' + (parseInt(nextGw) - 1) + '统计');
                table.render({
                    elem: '#scoutTable',
                    even: true,
                    toolbar: '#checkToolbar',
                    defaultToolbar: false,
                    url: '/stat/qryEventScoutList',
                    where: {event: parseInt(nextGw) - 1},
                    cellMinWidth: 60,
                    cols: [[
                        {title: '排名', type: 'numbers'},
                        {field: 'scoutName', title: '球探', align: 'center', width: 200},
                        {field: 'gkpName', title: '门将', align: 'center', width: 120},
                        {field: 'gkpPoints', title: '得分', align: 'center'},
                        {field: 'defName', title: '后卫', align: 'center', width: 120},
                        {field: 'defPoints', title: '得分', align: 'center'},
                        {field: 'midName', title: '中场', align: 'center', width: 120},
                        {field: 'midPoints', title: '得分', align: 'center'},
                        {field: 'fwdName', title: '前锋', align: 'center', width: 120},
                        {field: 'fwdPoints', title: '得分', align: 'center'},
                        {field: 'captainName', title: '队长', align: 'center', width: 120},
                        {field: 'captainPoints', title: '得分', align: 'center'},
                        {field: 'eventPoints', title: '周得分', align: 'center', width: 80},
                        {field: 'totalPoints', title: '总得分', align: 'center', width: 80}
                    ]],
                    initSort: {
                        field: 'eventPoints',
                        type: 'desc'
                    },
                    id: 'scoutTable',
                    done: function () {
                        soulTable.render(this);
                        // 下拉选项
                        axios.get('/stat/getScoutEventList')
                            .then(function (response) {
                                dropdown.suite("#checkEvent", {
                                    menus: response
                                });
                            })
                    }
                });
            }
        });

        table.on('toolbar(scoutTable)', function () {
            dropdown.onFilter("checkEvent", function (event) {
                if (event == 0) {
                    $("#checkGw").text('赛季统计');
                    table.render({
                        elem: '#scoutTable',
                        even: true,

<script>
    function showDifficulty(shortName, difficulty, event) {
        switch (difficulty) {
            case 1:
            case 2: {
                return '<div style="background-color: #00FF86;color: white">' + shortName + ' (GW' + event + ')' + '</div>';
            }
            case 3: {
                return '<div style="background-color: gray;color: white">' + shortName + ' (GW' + event + ')' + '</div>';
            }
            case 4: {
                return '<div style="background-color: #FF005A;color: white">' + shortName + ' (GW' + event + ')' + '</div>';
            }
            case 5: {
                return '<div style="background-color: #861D46;color: white">' + shortName + ' (GW' + event + ')' + '</div>';
            }
            default: {
                return d.shortName + ' (GW' + event + ')';
            }
        }

    }
</script>
