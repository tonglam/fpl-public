<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::header(~{::title},~{::link})">
    <title>letletme</title>
    <link href="https://cdn.jsdelivr.net/npm/time-to@1.3.1/timeTo.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" th:href="@{/css/index.css}"/>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid" th:fragment="main">
    <div class="layui-main">
        <div class="site-content">

            <div class="layui-row">

                <div class="layui-col-md8 layui-col-md-offset4">

                    <br>
                    <br>

                    <div class="layui-col-md12 layui-col-md-offset4" id="letletme">
                        <img style="width: 150px;height: 150px" th:src="@{/img/begbeg.jpg}">
                    </div>

                    <div class="layui-col-md12" style="margin-top: 30px">
                        <div class="layui-form-item layui-col-md-offset3">
                            <div class="layui-input-inline">
                                <input class="layui-input" name="knockoutRounds" placeholder="请输入球队id">
                            </div>
                            <button class="layui-btn" id="submitButton" lay-submit="createTournament" type="submit">开始
                            </button>
                        </div>
                    </div>

                    <div class="layui-col-md12 layui-col-md-offset1" style="font-size: 30px;margin-top: 30px"
                         id="deadlineTime"></div>

                    <div class="layui-col-md12 layui-col-md-offset2 timeTo timeTo-blue" id="countdown"
                         style="margin-top: 30px"></div>
                </div>

                <div class="layui-col-md12 layui-col-md-offset5" style="margin-top: 100px">
                    <div class="layui-anim layui-anim-scaleSpring layui-anim-loop"
                         style="font-size: 30px;color: red;">
                        让让我吧
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer">

</div>

</body>

<script th:replace="layout::baseScript"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/1.10.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/time-to@1.3.1/jquery.time-to.min.js"></script>

<script th:inline="javascript">
    let nextGw = [[${nextGw}]];
    let deadline = getLocalTime([[${deadline}]]);
    let deadLineTime = "GW" + nextGw + " deadline：" + deadline.format("yyyy-MM-dd hh:mm:ss");
    $("#deadlineTime").html(deadLineTime);
    $("#countdown").timeTo({
        timeTo: deadline,
        displayDays: 2,
        displayCaptions: true,
        fontSize: 48,
        captionSize: 20,
        lang: 'cn'
    });
</script>

<script>
    layui.use(['element', 'layer'], function () {
        $("#submitButton").on('click', function () {
            let entry = $("input[name=knockoutRounds]").val();
            // 保存
            axios.get('/saveEntry?entry=' + entry)
                .then(function () {
                    // 关闭
                    layer.msg('team_id更新成功', {
                        offset: '100px',
                        icon: 6,
                        shade: 0.8,
                        shadeClose: true,
                        time: 1500
                    });
                    // 回填
                    $("#teamIdBtn").text(entry);
                    // 重置
                    $("input[name=knockoutRounds]").val("");
                })
                .catch(function (error) {
                    console.info(error.message);
                });
        });
    });
</script>

</html>
