<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout::header(~{::title},~{})">
    <title>test-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content">

            <h1 style="font-size: 28px">test</h1>

            <div style="margin-top: 20px"></div>

            <div class="layui-row layui-col-space30">

                <div class="layui-col-md6">
                    <table class="layui-table" id="group1Table"></table>
                </div>

                <div class="layui-col-md6">
                    <table class="layui-table" id="group2Table"></table>
                </div>

            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

</body>

<script th:replace="layout::baseScript"></script>

<script th:inline="none">
    layui.use(['table', 'soulTable'], function () {
        let table = layui.table, soulTable = layui.soulTable;

        for (let i = 1; i < 3; i++) {
            let id = "group" + i + "Table";
            let elem = "#" + id;
            table.render({
                elem: elem,
                method: 'get',
                url: '/tournament/qryGroupInfoListByGroupId',
                where: {tournamentId: 1, groupId: 1},
                loading: true,
                cellMinWidth: 60,
                cols: [[
                    {field: 'groupName', title: '组别', align: 'center'},
                    {field: 'groupRank', title: '排名', align: 'center'},
                    {field: 'entryName', title: '队名', align: 'center', width: 180},
                    {field: 'win', title: '胜', align: 'center'},
                    {field: 'draw', title: '平', align: 'center'},
                    {field: 'lose', title: '负', align: 'center'},
                    {field: 'groupPoints', title: '积分', align: 'center'},
                ]],
                id: id,
                done: function () {
                    soulTable.render(this);
                }
            });
        }

    });
</script>


</html>
