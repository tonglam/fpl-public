<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout::header(~{::title},~{})">
    <title>查看赛程-自定义赛事-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content">

            <div class="layui-input-inline" style="margin-top: 5px">
                <button class="layui-btn layui-btn-primary layui-btn-sm" id="retrunButton" type="button">
                    <i class="layui-icon layui-icon-return"></i>
                </button>
            </div>
            <div class="layui-input-inline" style="margin-left: 10px">
                <h1 style="font-size: 28px" th:text="${tournamentInfo?.getName()}+' - 赛程'"></h1>
            </div>

            <div style="margin-top: 30px"></div>

            <div class="layui-tab" lay-filter="stageTab">
                <ul class="layui-tab-title">
                    <li class="layui-this" lay-id="groupTab"
                        th:text="'小组赛 ('+${tournamentInfo?.getGroupModeName()}+')'"></li>
                    <li lay-id="knockoutTab" th:text="'淘汰赛 ('+${tournamentInfo?.getKnockoutModeName()}+')'"></li>
                </ul>
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">

                        <div style="margin-top: 20px"></div>

                        <ul class="layui-timeline" style="font-family:Lucida Family,sans-serif">
                            <li class="layui-timeline-item" th:each="item,stat:${groupFixtureList}">
                                <i class="layui-icon layui-timeline-axis">&#xe63f;</i>
                                <div class="layui-timeline-content layui-text">
                                    <h1 class="layui-timeline-title" style="font-size: 18px"
                                        th:text="'GW'+${item.event}"></h1>
                                    <div class="layui-collapse" lay-filter="groupCollapse"
                                         th:each="eventItem,eventStat:${item.getGroupEventFixtureList()}">
                                        <div class="layui-colla-item">
                                            <h4 class="layui-colla-title"
                                                th:text="${eventItem.getGroupName()}+'组'"></h4>
                                            <div class="layui-colla-content">
                                                <div th:each="eventGroupItem,eventGroupStat:${eventItem.eventEntryFixtureList}">
                                                    <div style="margin-top: 15px"></div>
                                                    <p style="font-size: 15px"
                                                       th:text="'Match' +(${eventGroupStat.index}+1)+':'+${eventGroupItem.getShowMessage()}">
                                                    </p>
                                                    <div style="margin-bottom: 15px"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </li>
                        </ul>

                    </div>
                    <div class="layui-tab-item">

                        <div style="margin-top: 20px"></div>

                        <ul class="layui-timeline" style="font-family:Lucida Family,sans-serif">
                            <li class="layui-timeline-item" th:each="item,stat:${knockoutFixtureList}">
                                <i class="layui-icon layui-timeline-axis">&#xe63f;</i>
                                <div class="layui-timeline-content layui-text">
                                    <h1 class="layui-timeline-title" style="font-size: 18px"
                                        th:text="'GW'+${item.event}"></h1>
                                    <div th:each="eventItem,eventStat:${item.knockoutEventFixtureList}">
                                        <div style="margin-top: 15px"></div>
                                        <div style="font-size: 15px"
                                             th:text="'Round' +(${eventStat.index}+1)+':'+${eventItem.getShowMessage()}">
                                        </div>
                                        <div style="margin-bottom: 15px"></div>
                                    </div>
                                </div>
                            </li>
                        </ul>

                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

</body>

<script th:replace="layout::baseScript"></script>

<script>
    layui.use(['element'], function () {
        let $ = layui.jquery;

        $("#retrunButton").on('click', function () {
            window.location.replace("/tournament/result");
        });

    });

</script>

</html>
