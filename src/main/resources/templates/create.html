<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout::header">
    <meta charset="UTF-8">
    <title></title>

</head>
<body>
<div th:replace="layout::topnav">
</div>

<div class="layui-main">
    <div class="site-content">

        <h1 style="margin-bottom: 20px;font-size: 28px">创建自定义赛事</h1>

        <form action="" class="layui-form" lay-filter="tournamentForm" method="post">

            <fieldset class="layui-elem-field layui-field-title site-title" style="margin-top: 30px">
                <legend><a name="compatibility">赛事信息</a></legend>
            </fieldset>

            <!-- 基本设定 -->
            <div id="baseConfig">

                <div class="layui-form-item">
                    <label class="layui-form-label label-required">官方联赛</label>
                    <div class="layui-input-block" style="width: 50%">
                        <input autocomplete="on" class="layui-input" lay-reqtext="url不能为空"
                               lay-verify="required|url" name="url"
                               placeholder="https://fantasy.premierleague.com/leagues/***/standings/*" type="text">
                    </div>
                </div>

                <div class="layui-form-item" id="totalTeam">
                    <label class="layui-form-label">联赛队伍</label>
                    <div class="layui-input-inline">
                        <input class="layui-input" name="totalTeam" readonly type="number">
                    </div>
                    <div class="layui-hide" id="totalTeamTips">
                        <div class="layui-icon layui-icon-loading"></div>
                        <div class="layui-form-mid layui-word-aux" style="margin-left: 25px">稍候，统计中...
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label label-required">赛事名称</label>
                    <div class="layui-input-inline">
                        <input autocomplete="on" class="layui-input" lay-reqtext="赛事名称不能为空" lay-verify="required"
                               name="tournamentName" type="text">
                    </div>
                    <i class="layui-hide layui-icon layui-icon-ok" id="nameTipsIcon" style="color:black"></i>
                </div>

                <div class="layui-form-item">
                    <label class="layui-form-label label-required">创建人</label>
                    <div class="layui-input-inline">
                        <input autocomplete="on" class="layui-input" lay-reqtext="赛事创建人不能为空" lay-verify="required"
                               name="creator" type="text">
                    </div>
                </div>

            </div>

            <!-- 小组赛设定 -->
            <div class="layui-hide" id="groupConfig">

                <fieldset class="layui-elem-field layui-field-title site-title" style="margin-top: 30px">
                    <legend><a name="compatibility">小组赛设定</a></legend>
                </fieldset>

                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label label-required">小组赛模式</label>
                        <div class="layui-input-block">
                            <select lay-filter="groupMode" lay-reqtext="请选择小组赛模式" lay-verify="required"
                                    name="groupMode">
                                <option value=""></option>
                                <option value="0">无小组赛</option>
                                <option value="1">积分赛</option>
                                <option value="2">对阵赛</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="layui-hide layui-form-item" id="groupGw">
                    <div class="layui-inline">
                        <label class="layui-form-label label-required">开始时间</label>
                        <div class="layui-input-block">
                            <select lay-filter="groupStartGw" lay-search="" name="groupStartGw">
                                <option th:each="item,userStat:${gwMap}" th:text="${userStat.current.value}"
                                        th:value="${userStat.current.key}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label label-required">结束时间</label>
                        <div class="layui-input-block">
                            <select lay-filter="groupEndGw" lay-search="" name="groupEndGw">
                                <option th:each="item,userStat:${gwMap}" th:text="${userStat.current.value}"
                                        th:value="${userStat.current.key}"></option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="layui-hide layui-form-item" id="groupTeamsPerGroup">
                    <label class="layui-form-label label-required">每组队伍</label>
                    <div class="layui-input-inline">
                        <input autocomplete="off" class="layui-input" lay-verify="number" name="groupTeamsPerGroup"
                               type="number">
                    </div>
                    <div class="layui-form-mid layui-word-aux">每个小组分配的队伍数量</div>
                </div>

                <div class="layui-hide layui-form-item" id="groupNum">
                    <label class="layui-form-label">小组数量</label>
                    <div class="layui-input-inline">
                        <input autocomplete="off" class="layui-input" name="groupNum" readonly type="number">
                    </div>
                    <div class="layui-form-mid layui-word-aux">小组赛分组数量</div>
                </div>

                <div class="layui-hide layui-form-item" id="groupFillAverage">
                    <div class="layui-row">
                        <div class="layui-col-sm1" style="margin-right: 35px">
                            <label class="layui-form-label">加入平均分</label>
                        </div>
                        <div class="layui-col-sm2" style="margin-right: 48px">
                            <input lay-skin="switch" lay-text="是|否" name="groupFillAverage" type="checkbox" value=1>
                        </div>
                        <div class="layui-col-sm6">
                            <div class="layui-form-mid layui-word-aux">是否在小组内加入平均分average，使得每个小组的队伍数量一样</div>
                        </div>
                    </div>
                </div>

                <div class="layui-hide layui-form-item" id="groupQualifiers">
                    <label class="layui-form-label label-required">出线数量</label>
                    <div class="layui-input-inline">
                        <input autocomplete="off" class="layui-input" lay-verify="number" name="groupQualifiers"
                               type="number">
                    </div>
                    <div class="layui-form-mid layui-word-aux">每个小组出线的队伍数量</div>
                </div>

            </div>

            <!-- 淘汰赛设定 -->
            <div class="layui-hide" id="knockoutConfig">

                <fieldset class="layui-elem-field layui-field-title site-title" style="margin-top: 30px">
                    <legend><a name="compatibility">淘汰赛设定</a></legend>
                </fieldset>

                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label label-required">淘汰赛模式</label>
                        <div class="layui-input-block">
                            <select lay-filter="knockoutMode" lay-reqtext="请选择淘汰赛模式" lay-verify="required"
                                    name="knockoutMode">
                                <option value=""></option>
                                <option value="0">无淘汰赛</option>
                                <option value="1">单循环</option>
                                <option value="2">主客场</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-inline layui-hide" id="knockoutStartGwSelect">
                        <label class="layui-form-label label-required" id="knockoutStartGwSelectLabel">开始时间</label>
                        <div class="layui-input-block">
                            <select lay-filter="knockoutStartGwSelect" lay-search="" lay-verify="gw"
                                    name="knockoutStartGwSelect">
                                <option th:each="item,userStat:${gwMap}" th:text="${userStat.current.value}"
                                        th:value="${userStat.current.key}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline layui-hide" id="knockoutStartGw">
                        <label class="layui-form-label" id="knockoutStartGwLabel">开始时间</label>
                        <div class="layui-input-inline">
                            <input autocomplete="off" class="layui-input" name="knockoutStartGw" readonly type="text">
                        </div>
                    </div>
                    <div class="layui-inline layui-hide" id="knockoutEndGw">
                        <label class="layui-form-label" id="knockoutEndGwLabel">结束时间</label>
                        <div class="layui-input-inline">
                            <input autocomplete="off" class="layui-input" name="knockoutEndGw" readonly type="text">
                        </div>
                    </div>
                </div>

                <div class="layui-hide layui-form-item" id="knockoutTeams">
                    <label class="layui-form-label">队伍数量</label>
                    <div class="layui-input-inline">
                        <input autocomplete="off" class="layui-input" name="knockoutTeams" readonly type="number">
                    </div>
                    <div class="layui-form-mid layui-word-aux">淘汰赛球队总数</div>
                </div>

                <div class="layui-hide layui-form-item" id="knockoutRounds">
                    <label class="layui-form-label">轮次</label>
                    <div class="layui-input-inline">
                        <input autocomplete="off" class="layui-input" name="knockoutRounds" readonly type="number">
                    </div>
                    <div class="layui-form-mid layui-word-aux">淘汰赛总轮次</div>
                </div>

                <!-- 提交 -->
                <div class="layui-hide layui-form-item" id="createButton">
                    <div class="layui-input-block">
                        <button class="layui-btn" id="submitButton" lay-filter="createTournament" lay-submit=""
                                type="submit">
                            创建赛事
                        </button>
                    </div>
                </div>

            </div>

        </form>

    </div>
</div>

<div th:replace="layout::footer">

</div>

</body>

<script th:src="@{/js/math.min.js}"></script>

<script>
    layui.use(['form', 'element', 'layer'], function () {
        let $ = layui.jquery;
        let form = layui.form;
        let layer = layui.layer;

        /**
         * 监听url输入框（失去焦点）
         * a.校验url格式
         * b.统计出联赛队伍数量
         * c.展示小组赛设置
         *
         * @author tong 2020.08.08
         */
        $("input[name=url]").on('focusout', function () {
            let urlDom = $("input[name=url]");
            let totalTeamTipsDom = $("#totalTeamTips");
            let groupConfigDom = $("#groupConfig");
            let totalTeamDom = $("input[name=totalTeam]");
            // a
            let url = urlDom.val();
            if (url == '') {
                totalTeamDom.val('');
                totalTeamTipsDom.addClass("layui-hide");
                groupConfigDom.addClass("layui-hide");
                return false;
            }
            if (!new RegExp("^https://fantasy.premierleague.com/leagues/.*/standings/[c|h]$").test(url)) {
                layer.msg("联赛url格式错误，请重试", {time: 1000});
                urlDom.val('');
                totalTeamDom.val('');
                totalTeamTipsDom.addClass("layui-hide");
                groupConfigDom.addClass("layui-hide");
                return false;
            }
            // b
            totalTeamTipsDom.removeClass("layui-hide");
            axios.get('/tournament/countLeagueTeams', {
                params: {
                    url: url
                }
            })
                .then(function (response) {
                    totalTeamDom.val(response.data);
                    totalTeamTipsDom.addClass("layui-hide");
                    // c
                    groupConfigDom.removeClass("layui-hide");
                })
                .catch(function () {
                    layer.msg("联赛url读取错误，请重试", {icon: 5, time: 2000});
                    urlDom.val('');
                    totalTeamTipsDom.addClass("layui-hide");
                    groupConfigDom.removeClass("layui-hide");
                });
        });

        /**
         * 监听赛事名称输入框（失去焦点）
         * a.判空
         * b.调接口查询是否重复
         * c.根据返回显示tips
         *
         * @author tong 2020.08.11
         */
        $("input[name=tournamentName]").on('focusout', function () {
            let nameDom = $("input[name=tournamentName]");
            let nameTipsIconDom = $("#nameTipsIcon");
            let groupConfigDom = $("#groupConfig");
            // a
            let name = nameDom.val();
            if (name == '') {
                nameTipsIconDom.addClass("layui-hide");
                groupConfigDom.addClass("layui-hide");
                return false;
            }
            // b
            axios.get('/tournament/checkTournamentName', {
                params: {
                    name: name
                }
            })
                .then(function (response) {
                    // b
                    if (response.data == true) {
                        nameTipsIconDom.removeClass("layui-hide");
                    } else if (response.data == false) {
                        layer.msg("赛事名称已存在，请更换", {time: 1000});
                        nameTipsIconDom.addClass("layui-hide");
                        nameDom.val('');
                    }
                })
                .catch(function () {
                    layer.msg("赛事名称查询错误，请重试", {time: 1000});
                    nameDom.val('');
                });
        });

        /**
         * 监听小组赛模式下拉框（下拉选择）
         * a.清除淘汰赛配置
         * b.无小组赛：A.展示淘汰赛设置；B.隐藏所有设置项；C.相关配置值重置；D.不能无淘汰赛；E.设置淘汰赛队伍数量；F.设置淘汰赛开始时间必填
         * c.积分赛：A.有淘汰赛时，展示创建按钮；B.不展示平均分占位；C.有淘汰赛时，展示小组出线数量
         * d.对阵赛：A.有淘汰赛时，展示创建按钮；B.不展示平均分占位；C.有淘汰赛时，展示小组出线数量
         *
         * @author tong 2020.08.08
         */
        form.on('select(groupMode)', function (data) {
            let knockoutConfigDom = $("#knockoutConfig");
            let groupGwDom = $("#groupGw");
            let groupTeamsPerGroupDom = $("#groupTeamsPerGroup");
            let groupNumDom = $("#groupNum");
            let groupFillAverageDom = $("#groupFillAverage");
            let groupQualifiersDom = $("#groupQualifiers");
            let groupStartGwDom = $("select[name=groupStartGw]");
            let groupEndGwDom = $("select[name=groupEndGw]");
            let knockoutStartGwSelectDom = $("select[name=knockoutStartGw]");
            let knockoutStartGwDom = $("#knockoutStartGw");
            let knockoutEndGwDom = $("#knockoutEndGw");
            let knockoutTeamsDom = $("input[name=knockoutTeams]");
            let knockoutRoundsDom = $("input[name=knockoutRounds]");
            let totalTeam = $("input[name=totalTeam]").val();
            let groupMode = data.value;
            let knockoutMode = $("select[name=knockoutMode]").val();
            let knockoutTeams = knockoutTeamsDom.val();
            let knockoutRounds = knockoutRoundsDom.val();
            // a
            clearKnockoutConfig();
            switch (groupMode) {
                case "0": { // 无小组赛
                    // A
                    knockoutConfigDom.removeClass("layui-hide");
                    // B
                    groupGwDom.addClass("layui-hide");
                    groupTeamsPerGroupDom.addClass("layui-hide");
                    groupNumDom.addClass("layui-hide");
                    groupFillAverageDom.addClass("layui-hide");
                    groupQualifiersDom.addClass("layui-hide");
                    // C
                    groupStartGwDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='']").click();
                    groupEndGwDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='']").click();
                    groupTeamsPerGroupDom.val('');
                    groupNumDom.val('');
                    groupFillAverageDom.val('');
                    groupQualifiersDom.val('');
                    // D
                    if (knockoutMode == "0") {
                        layer.msg("没有小组赛又没有淘汰赛还弄个啥", {icon: 5, time: 1000});
                        return false;
                    }
                    if (knockoutMode == "1" || knockoutMode == "2") {
                        // E
                        knockoutTeamsDom.val(totalTeam);
                        // F
                        knockoutStartGwSelectDom.addClass("label-required");
                        knockoutStartGwDom.attr("lay-search", "");
                        form.render("select", "knockoutStartGwSelect");
                    }
                    break;
                }
                case "1": { // 积分赛
                    // A
                    knockoutConfigDom.removeClass("layui-hide");
                    // B
                    groupGwDom.removeClass("layui-hide");
                    groupTeamsPerGroupDom.removeClass("layui-hide");
                    groupNumDom.removeClass("layui-hide");
                    groupFillAverageDom.addClass("layui-hide");
                    // C
                    if (knockoutMode != '' && knockoutMode != "0") {
                        groupQualifiersDom.removeClass("layui-hide");
                        knockoutStartGwSelectDom.addClass("layui-hide");
                        knockoutStartGwDom.removeClass("layui-hide");
                        knockoutEndGwDom.removeClass("layui-hide");
                    }
                    // D
                    if (knockoutTeams != '') {
                        knockoutTeamsDom.val('');
                    }
                    if (knockoutRounds != '') {
                        knockoutRoundsDom.val('');
                    }
                    break;
                }
                case "2": { // 对阵赛
                    // A
                    knockoutConfigDom.removeClass("layui-hide");
                    // B
                    groupGwDom.removeClass("layui-hide");
                    groupTeamsPerGroupDom.removeClass("layui-hide");
                    groupNumDom.removeClass("layui-hide");
                    groupFillAverageDom.removeClass("layui-hide");
                    // C
                    if (knockoutMode != '' && knockoutMode != 0) {
                        groupQualifiersDom.removeClass("layui-hide");
                        knockoutStartGwSelectDom.addClass("layui-hide");
                        knockoutStartGwDom.removeClass("layui-hide");
                        knockoutEndGwDom.removeClass("layui-hide");
                    }
                    // D
                    if (knockoutTeams != '') {
                        knockoutTeamsDom.val('');
                    }
                    if (knockoutRounds != '') {
                        knockoutRoundsDom.val('');
                    }
                    break;
                }
                default: { // 请选择
                    knockoutConfigDom.addClass("layui-hide");
                    groupGwDom.addClass("layui-hide");
                    groupTeamsPerGroupDom.addClass("layui-hide");
                    groupNumDom.addClass("layui-hide");
                    groupFillAverageDom.addClass("layui-hide");
                }
            }
        });

        /**
         * 监听淘汰赛模式下拉框（下拉选择）
         * a.无淘汰赛：A相关配置值重置；B.隐藏配置；C.不能无小组赛；D.有小组赛时，展示创建按钮
         * b.有淘汰赛：A.展示创建按钮；
         * B.无小组赛时：a).展示淘汰赛开始时间下拉项；b).展示淘汰赛队伍数量和淘汰赛轮次；c).计算淘汰赛结束时间；
         * C.有小组赛时：a).展示每组出线数量，展示淘汰赛开始时间、结束时间输入框；D.有每组队伍和小组数时，计算淘汰赛数量；
         * E.有淘汰赛球队数时，计算淘汰赛轮次；F.有小组赛结束时间时，计算淘汰赛开始时间；
         * G.有开始时间时，计算结束时间
         *
         * @author tong 2020.08.08
         */
        form.on('select(knockoutMode)', function (data) {
            let groupEndDom = $("input[name=groupEnd]");
            let groupNumDom = $("input[name=groupNum]");
            let groupQualifiersDom = $("#groupQualifiers");
            let knockoutStartGwSelectDom = $("#knockoutStartGwSelect");
            let knockoutStartGwDom = $("#knockoutStartGw");
            let knockoutEndGwDom = $("#knockoutEndGw");
            let knockoutTeamsDom = $("#knockoutTeams");
            let knockoutRoundsDom = $("#knockoutRounds");
            let createButtonDom = $("#createButton");
            let totalTeam = $("input[name=totalTeam]").val();
            let groupMode = $("select[name=groupMode]").val();
            let groupEndGw = getGwValue(groupEndDom.val());
            let groupNum = groupNumDom.val();
            let groupQualifiers = groupQualifiersDom.val();
            let knockoutMode = data.value;
            let knockoutStartGw = getGwValue(knockoutStartGwSelectDom.val());

            switch (knockoutMode) {
                case "0": {
                    // A
                    clearKnockoutConfig();
                    // B
                    groupQualifiersDom.addClass("layui-hide");
                    knockoutStartGwSelectDom.addClass("layui-hide");
                    knockoutStartGwDom.addClass("layui-hide");
                    knockoutEndGwDom.addClass("layui-hide");
                    knockoutTeamsDom.addClass("layui-hide");
                    knockoutRoundsDom.addClass("layui-hide");
                    // C
                    if (groupMode == "0") {
                        layer.msg("没有小组赛又没有淘汰赛还弄个啥", {icon: 5, time: 1000});
                        createButtonDom.addClass("layui-hide");
                        return false;
                    }
                    // D
                    createButtonDom.removeClass("layui-hide");
                    break;
                }
                case "1":
                case "2": {
                    // A
                    createButtonDom.removeClass("layui-hide");
                    knockoutTeamsDom.removeClass("layui-hide");
                    knockoutRoundsDom.removeClass("layui-hide");
                    // B
                    if (groupMode == "0") {
                        // 展示
                        knockoutStartGwSelectDom.removeClass("layui-hide");
                        knockoutEndGwDom.removeClass("layui-hide");
                        // 淘汰赛球队
                        knockoutTeamsDom.val(totalTeam);
                        // 淘汰赛轮次
                        let roundNum = Math.ceil(Math.log(totalTeam) / Math.log(2)) * knockoutMode;
                        knockoutRoundsDom.val(roundNum);
                        // 淘汰赛结束时间
                        if (knockoutStartGw != '') {
                            let knockoutEndGw = parseInt(knockoutStartGw) + roundNum - 1;
                            if (knockoutEndGw > 38) {
                                layer.msg("淘汰赛打不完啦，最晚开始时间为：" + setGwStr(38 - roundNum + 1) + "！", {
                                    icon: 5,
                                    time: 1000,
                                    title: ""
                                });
                                knockoutStartGwSelectDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='']").click();
                                knockoutEndGwDom.val('');
                                return false;
                            }
                            knockoutEndGwDom.val(setGwStr(knockoutEndGw));
                        }
                    }
                    // C
                    if (groupMode == "1" || groupMode == "2") {
                        groupQualifiersDom.removeClass("layui-hide");
                        knockoutStartGwSelectDom.addClass("layui-hide");
                        knockoutStartGwDom.removeClass("layui-hide");
                        knockoutEndGwDom.removeClass("layui-hide");
                        // 淘汰赛球队
                        if (groupQualifiers == '') {
                            return false;
                        }
                        if (groupNum == '') {
                            return false;
                        }
                        let knockoutTeamNum = parseInt(groupQualifiers) * parseInt(groupNum);
                        knockoutTeamsDom.val(knockoutTeamNum);
                        // 淘汰赛轮次
                        let roundNum = Math.ceil(Math.log(knockoutTeamNum) / Math.log(2)) * knockoutMode;
                        knockoutRoundsDom.val(roundNum);
                        // 淘汰赛开始时间
                        if (groupEndGw != '') {
                            let knockoutStartGw = groupEndGw + 1;
                            if (knockoutStartGw > 38) {
                                layer.msg("淘汰赛打不完啦，请修改小组赛配置！", {icon: 5, time: 1000});
                                return false;
                            }
                            knockoutStartGwDom.val(setGwStr(knockoutStartGw));
                            // 淘汰赛结束时间
                            let knockoutEndGw = groupEndGw + roundNum;
                            if (knockoutEndGw > 38) {
                                layer.msg("淘汰赛打不完啦，请修改小组赛起始时间！", {icon: 5, time: 1000});
                                knockoutStartGwDom.val('');
                                knockoutEndGwDom.val('');
                                return false;
                            }
                            knockoutEndGwDom.val(setGwStr(knockoutEndGw));
                        }
                    }
                    break;
                }
                default: { // 请选择
                    createButtonDom.addClass("layui-hide");
                    groupQualifiersDom.addClass("layui-hide");
                    knockoutStartGwSelectDom.addClass("layui-hide");
                    knockoutStartGwDom.addClass("layui-hide");
                    knockoutEndGwDom.addClass("layui-hide");
                    knockoutTeamsDom.addClass("layui-hide");
                    knockoutRoundsDom.addClass("layui-hide");
                }
            }
        });

        /**
         * 监听小组赛开始时间下拉框（下拉选择）
         * a.校验开始时间
         *
         * @author tong 2020/08/09
         */
        form.on('select(groupStartGw)', function () {
            let groupStartGwDom = $("select[name=groupStartGw]");
            let groupEndGwDom = $("select[name=groupEndGw]");
            let groupStartGw = getGwValue(groupStartGwDom.val());
            let groupEndGw = getGwValue(groupEndGwDom.val());
            if (groupStartGw == '') {
                return false;
            }
            // a
            if (groupEndGw != '' && groupStartGw >= groupEndGw) {
                layer.msg("开始时间必须早于结束时间！", {time: 1000});
                groupStartGwDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='']").click();
            }
        });

        /**
         * 监听小组赛结束时间下拉框（下拉选择）
         * a.校验结束时间
         * b.有淘汰赛时：有淘汰赛轮次，A.计算淘汰赛开始时间；B.计算淘汰赛结束时间
         *
         * @author tong 2020/08/09
         */
        form.on('select(groupEndGw)', function () {
            let groupEndGwDom = $("select[name=groupEndGw]");
            let groupStartGwDom = $("select[name=groupStartGw]");
            let knockoutStartGwDom = $("input[name=knockoutStartGw]");
            let knockoutEndGwDom = $("input[name=knockoutEndGw]");
            let groupEndGw = getGwValue(groupEndGwDom.val());
            let groupStartGw = getGwValue(groupStartGwDom.val());
            let knockoutMode = $("select[name=knockoutMode]").val();
            let knockoutRounds = $("input[name=knockoutRounds]").val();
            if (groupEndGw == '') {
                return false;
            }
            // a
            if (groupStartGw != '' && groupStartGw >= groupEndGw) {
                layer.msg("结束时间必须晚于开始时间！", {time: 1000});
                groupEndGwDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='']").click();
                return false;
            }
            // b
            if (knockoutMode == "1" || knockoutMode == "2") {
                if (knockoutRounds == '') {
                    return false;
                }
                // A
                let knouckoutStartGw = groupEndGw + 1;
                knockoutStartGwDom.val(setGwStr(knouckoutStartGw));
                // B
                let knouckoutEndGw = knouckoutStartGw + parseInt(knockoutRounds);
                knockoutEndGwDom.val(setGwStr(knouckoutEndGw));
            }
        });

        /**
         * 监听每组队伍数量（失去焦点）
         * a.校验每组队伍人数
         * b.校验每组出线队伍数量
         * c.计算小组数量
         * d.计算淘汰赛队伍数量和淘汰赛轮次
         * c.如有有小组赛结束时间，计算淘汰赛时间
         *
         * @author tong 2020.08.09
         */
        $("input[name=groupTeamsPerGroup]").on('focusout', function () {
            let groupNumDom = $("input[name=groupNum]");
            let knockoutTeamsDom = $("input[name=knockoutTeams]");
            let knockoutRoundsDom = $("input[name=knockoutRounds]")
            let knockoutStartGwDom = $("input[name=knockoutStartGw]");
            let knockoutEndGwDom = $("input[name=knockoutEndGw]");
            let totalTeam = $("#totalTeams").val();
            let groupEndGw = getGwValue($("select[name=groupEndGw]").val());
            let groupTeamsPerGroup = $("input[name=groupTeamsPerGroup]").val();
            let groupQualifiers = $("input[name=groupQualifiers]").val();
            let knockoutMode = $("select[name=knockoutMode]").val();
            if (groupTeamsPerGroup == '') {
                groupNumDom.val('');
                return false;
            }
            // a
            if (groupTeamsPerGroup > totalTeam) {
                layer.msg("分组队伍数量不能大于联赛队伍总数", {time: 1000});
                return false;
            }
            // b
            if (groupQualifiers > groupTeamsPerGroup) {
                layer.msg("小组出线数量不能大于小组队伍数量", {time: 1000});
                return false;
            }
            // c
            let groupNum = Math.ceil(totalTeam / groupTeamsPerGroup);
            groupNumDom.val(groupNum);
            // d
            if (knockoutMode != 1 && knockoutMode != 2) {
                return false;
            }
            if (groupQualifiers == '') {
                return false;
            }
            let knockoutTeams = groupQualifiers * groupNum;
            knockoutTeamsDom.val(knockoutTeams);
            let knockoutRounds = Math.ceil(Math.log(knockoutTeams) / Math.log(2)) * knockoutMode;
            knockoutRoundsDom.val(knockoutRounds);
            // e
            if (groupEndGw != '') {
                let knockoutStartGw = groupEndGw + 1;
                if (knockoutStartGw > 38) {
                    layer.msg("淘汰赛打不完啦，请修改小组赛配置", {time: 1000});
                    return false;
                }
                knockoutStartGwDom.val(setGwStr(knockoutStartGw));
                // 淘汰赛结束时间
                let knockoutEndGw = groupEndGw + knockoutRounds;
                if (knockoutEndGw > 38) {
                    layer.msg("淘汰赛打不完啦，请修改小组赛起始时间", {time: 1000});
                    knockoutStartGwDom.val('');
                    knockoutEndGwDom.val('');
                    return false;
                }
                knockoutEndGwDom.val(setGwStr(knockoutEndGw));
            }
        });

        /**
         * 监听每组出线数量(失去焦点)
         * 有每组出线数量，一定得是有淘汰赛
         * a.校验每组出现数量不能大于每组队伍数量
         * b.有小组数量时，计算淘汰赛球队数量和淘汰赛轮次
         * c.有小组赛结束时间，计算淘汰赛开始时间
         * d.有淘汰赛开始时间，计算淘汰赛结束时间
         *
         * @author tong 2020.08.08
         */
        $("input[name=groupQualifiers]").on('focusout', function () {
            let groupQualifiersDom = $("input[name=groupQualifiers]");
            let knockoutStartGwDom = $("input[name=knockoutStartGw]");
            let knockoutEndGwDom = $("input[name=knockoutEndGw]");
            let knockoutTeamsDom = $("input[name=knockoutTeams]");
            let knockoutRoundsDom = $("input[name=knockoutRounds]");
            let groupNum = $("input[name=groupNum]").val();
            let groupEndGw = getGwValue($("select[name=groupEndGw]").val());
            let groupTeamsPerGroup = $("input[name=groupTeamsPerGroup]").val();
            let groupQualifiers = groupQualifiersDom.val();
            let knockoutMode = $("select[name=knockoutMode]").val();
            let knockoutStartGw = getGwValue(groupEndGw) + 1;

            if (groupQualifiers == '') {
                return false;
            }
            // a
            if (groupQualifiers > groupTeamsPerGroup) {
                layer.msg("小组出线数量不能大于小组队伍数量", {time: 1000});
                return false;
            }
            // b
            if (groupNum == '') {
                return false;
            }
            let knockoutTeams = parseInt(groupQualifiers) * parseInt(groupNum);
            knockoutTeamsDom.val(knockoutTeams);
            let knockoutRounds = Math.ceil(Math.log(knockoutTeams) / Math.log(2)) * knockoutMode;
            knockoutRoundsDom.val(knockoutRounds);
            // c
            if (groupEndGw == '') {
                return false;
            }
            knockoutStartGwDom.val(setGwStr(knockoutStartGw));
            // d
            let knockoutEndGw = knockoutStartGw + knockoutRounds - 1;
            knockoutEndGwDom.val(setGwStr(knockoutEndGw));
        });

        /**
         * 监听淘汰赛开始时间下拉框（下拉选择）
         * a.淘汰赛开始时间为空，设置淘汰赛结束时间为空
         * b.淘汰赛伦次为空，设置淘汰赛结束时间为空
         *
         * @author tong 2020.08.09
         */
        form.on('select(knockoutStartGwSelect)', function (data) {
            let knockoutEndGwDom = $("input[name=knockoutEndGw]");
            let roundNum = $("input[name=knockoutRounds]").val();
            let knockoutStartGwSelectDom = $("select[name=knockoutStartGwSelect]");
            // a
            if (data.value == '') {
                knockoutEndGwDom.val('');
                return false;
            }
            // b
            if (roundNum == '') {
                return false;
            }
            // c
            let knockoutEndGw = getGwValue(data.value) + roundNum - 1;
            if (knockoutEndGw > 38) {
                layer.msg("淘汰赛最晚开始时间为：GW" + (38 - roundNum + 1), {time: 1000});
                // 重置淘汰赛开始时间和结束时间
                knockoutStartGwSelectDom.siblings("div.layui-form-select").find("dl").find("dd[lay-value='']").click();
                knockoutEndGwDom.val('');
                return false;
            }
            knockoutEndGwDom.val(setGwStr(knockoutEndGw));
        });

        /**
         * 表单提交
         *
         * @author 2020.08.08
         */
        form.on('submit(createTournament)', function (data) {
            let formData = data.field;
            // 设置时间
            formData.groupStartGw = getGwValue(formData.groupStartGw);
            formData.groupEndGw = getGwValue(formData.groupEndGw);
            let knockoutStartGw = getGwValue($("input[name=knockoutStartGw]").val());
            if (knockoutStartGw != '') {
                formData.knockoutStartGw = knockoutStartGw;
            } else {
                formData.knockoutStartGw = getGwValue($("select[name=knockoutStartGwSelect]").val());
            }
            formData.knockoutEndGw = getGwValue(formData.knockoutEndGw);
            // 设置小组加入平均分
            formData.groupFillAverage == '1' ? formData.groupFillAverage = true : formData.groupFillAverage = false;
            // 禁用提交按钮
            $("#submitButton").attr("disabled", "");
            // 提交到接口
            layer.confirm("确认创建？", {closeBtn: 0, title: ""}, function () {
                axios.post('/tournament/createNewTournament', formData)
                    .then(function (response) {
                        layer.msg(response.data, {icon: 6, time: 1000}, function () {
                            window.location.replace("/tournament/create");
                        });
                    })
                    .catch(function (error) {
                        layer.msg(error.data + "请重新尝试！", {icon: 2, time: 1000});
                        $("#submitButton").removeAttr("disabled");
                    });
            });
            return false;
        });

    });
</script>

<script>

    function getGwValue(gwStr) {
        if (gwStr == '') {
            return '';
        }
        if (gwStr.indexOf("GW") > 0) {
            parseInt(gwStr.substr(2, gwStr.length));
        }
        return parseInt(gwStr);
    }

    function setGwStr(value) {
        if (value == '') {
            return '';
        }
        return "GW" + value;
    }

    function clearKnockoutConfig() {
        let $ = layui.jquery;
        $("select[name=knockoutStartGwSelect]").siblings("div.layui-form-select").find("dl").find("dd[lay-value='']").click();
        $("input[name=knockoutStartGw]").val('');
        $("input[name=knockoutEndGw]").val('');
        $("input[name=knockoutTeams]").val('');
        $("input[name=knockoutRounds]").val('');
    }
</script>

</html>
