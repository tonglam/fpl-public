<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout::header(~{::title},~{})">
    <title>得分查看-我的fpl-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content">

            <h1 style="font-size: 28px">得分查看</h1>

            <div style="margin-top: 30px"></div>

            <table class="layui-table">
                <colgroup>
                    <col width="60">
                    <col width="200">
                    <col width="150">
                    <col width="60">
                    <col width="100">
                    <col width="60">
                    <col width="80">
                    <col width="60">
                    <col width="100">
                    <col>
                </colgroup>
                <thead>
                <tr>
                    <th style="text-align: center">team_id</th>
                    <th style="text-align: center">队伍名称</th>
                    <th style="text-align: center">玩家名称</th>
                    <th style="text-align: center">地区</th>
                    <th style="text-align: center">开始时间</th>
                    <th style="text-align: center">总分</th>
                    <th style="text-align: center">总排名</th>
                    <th style="text-align: center">余额</th>
                    <th style="text-align: center">球队身价</th>
                    <th style="text-align: center">转会总数</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td style="text-align: center" th:text="${entryInfo?.entry}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.entryName}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.playerName}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.region}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.startedEvent}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.overallPoints}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.overallRank}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.bank}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.teamValue}"></td>
                    <td style="text-align: center" th:text="${entryInfo?.totalTransfers}"></td>
                </tr>
                </tbody>
            </table>

            <div class="layui-tab" lay-allowClose="true" lay-filter="eventResultTab">
                <ul class="layui-tab-title">
                    <li class="layui-this">赛季得分</li>
                </ul>
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="entryResultTable" lay-filter="entryResultTable"></table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

</body>

<script th:replace="layout::baseScript"></script>

<script th:replace="layout::entryInputLayer"></script>

<script th:inline="none">
    layui.use(['element', 'table', 'layer', 'soulTable'], function () {

        let $ = layui.jquery, element = layui.element, table = layui.table,
            soulTable = layui.soulTable;

        soulTable.config({
            drag: false,
            overflow: {
                type: 'tips',
                header: true,
                total: true
            }
        });

        table.render({
            elem: '#entryResultTable',
            method: 'get',
            url: '/my_fpl/qryEntryResultList',
            toolbar: '#toolbar',
            defaultToolbar: ['filter', {title: '筛选重置', layEvent: 'clearFilter', icon: 'layui-icon-refresh-3'}],
            loading: true,
            cellMinWidth: 100,
            cols: [[
                {field: 'entry', title: 'team_id', align: 'center'},
                {field: 'event', title: 'GW', align: 'center'},
                {field: 'chip', title: '开卡', align: 'center'},
                {field: 'transfers', title: '转会', align: 'center', sort: true, filter: true},
                {field: 'points', title: '得分', align: 'center', sort: true, filter: true},
                {field: 'transfersCost', title: '剁手', align: 'center', sort: true, filter: true},
                {field: 'netPoints', title: '净得分', align: 'center', sort: true, filter: true, width: 120},
                {field: 'benchPoints', title: '板凳分', align: 'center', sort: true, filter: true, width: 120},
                {field: 'rank', title: '排名', align: 'center', sort: true}
            ]],
            filter: {
                items: ['data', 'condition'],
                bottom: false
            },
            id: 'entryResultTable',
            done: function () {
                soulTable.render(this);
            }
        });

        table.on('toolbar(entryResultTable)', function (obj) {
            if (obj.event === 'clearFilter') {
                soulTable.clearFilter('entryResultTable');
            }
        });

        table.on('row(entryResultTable)', function (obj) {
            let event = obj.data.event;
            // 是否存在
            if ($(".layui-tab-title li[lay-id='" + event + "']").length > 0) {
                //选项卡已经存在
                element.tabChange('eventResultTab', event);
                return false;
            }
            // 增加标签页
            let tableId = event + "Table";
            element.tabAdd('eventResultTab', {
                title: 'GW' + event,
                content: '<table class="layui-table" id=' + tableId + ' lay-filter=' + tableId + '></table>',
                id: event
            });
            // 切换
            element.tabChange('eventResultTab', event);
        });

        element.on('tab(eventResultTab)', function () {
            let event = $(this).attr("lay-id");
            if (event == null) {
                return false;
            }

            let tableId = event + "Table";

            table.render({
                elem: '#' + tableId,
                url: '/my_fpl/qryEntryEventResult',
                where: {event: event},
                toolbar: '#toolbar',
                defaultToolbar: ['filter', {
                    title: '筛选重置',
                    layEvent: 'clearFilter',
                    icon: 'layui-icon-refresh-3'
                }],
                loading: true,
                cellMinWidth: 60,
                cols: [[
                    {
                        field: 'webName', title: '姓名', align: 'center', width: 150, templet: function (d) {
                            if (d.captain == true) {
                                return d.webName + ' (c)';
                            } else if (d.viceCaptain == true) {
                                return d.webName + ' (vc)';
                            } else {
                                return d.webName;
                            }
                        }
                    },
                    {field: 'elementTypeName', title: '位置', align: 'center', filter: true},
                    {field: 'points', title: '得分', align: 'center', sort: true, filter: true},
                    {field: 'multiplier', title: '比赛数量', align: 'center', sort: true, filter: true}
                ]],
                filter: {
                    items: ['data', 'condition'],
                    bottom: false,
                    clearFilter: true
                },
                done: function () {
                    soulTable.render(this);
                },
                id: tableId
            });
        });


    });
</script>

</html>
