<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout::header(~{::title},~{})">
    <title>查看联赛-我的fpl-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">

        <div class="site-content">

            <h1 style="font-size: 28px">查看联赛</h1>

            <div style="margin-top: 30px"></div>

            <form class="layui-form">

                <fieldset class="layui-elem-field layui-field-title site-title"
                          style="margin-top: 30px">
                    <legend><a>查看的输入官方联赛id</a></legend>
                </fieldset>

                <blockquote class="layui-elem-quote">直接查看官方联赛只支持队伍少于100的官方联赛，且只提供当前比赛周数据。若不满足现要求，请先创建自定义联赛后，查看已创建的赛事。
                </blockquote>

                <div style="margin-top: 30px"></div>

                <div class="layui-form-item">

                    <div class="layui-inline">
                        <label class="layui-form-label" style="margin-left: -30px">官方联赛id</label>
                        <div class="layui-input-inline" style="width: 110px">
                            <input autocomplete="on" class="layui-input" name="leagueId" type="text">
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label" style="margin-left: -50px">类型</label>
                        <div class="layui-input-inline" style="width: 120px">
                            <select class="layui-select" lay-filter="leagueType" name="leagueType">
                                <option value="Classic">Classic</option>
                                <option value="H2H">H2H</option>
                            </select>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label" style="margin-left: -40px">赛季</label>
                        <div class="layui-input-inline" style="width: 100px">
                            <input class="layui-input" type="text" value="2021" disabled>
                        </div>
                    </div>

                    <button class="layui-btn" id="searchServiceButton" style="margin-left: 20px;margin-top: -5px"
                            type="button">查看
                    </button>

                </div>

                <fieldset class="layui-elem-field layui-field-title site-title"
                          style="margin-top: 30px">
                    <legend><a>查看已创建的赛事</a></legend>
                </fieldset>

                <div class="layui-form-item">

                    <div class="layui-inline">
                        <label class="layui-form-label" style="margin-left: -30px">官方联赛id</label>
                        <div class="layui-input-inline" style="width: 110px">
                            <input autocomplete="on" class="layui-input" name="leagueId" type="text">
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label" style="margin-left: -30px">赛事名称</label>
                        <div class="layui-input-inline" style="width: 180px">
                            <input autocomplete="on" class="layui-input" name="name" type="text">
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label" style="margin-left: -50px">创建者</label>
                        <div class="layui-input-inline" style="width: 150px">
                            <input autocomplete="on" class="layui-input" name="creator" type="text">
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label" style="margin-left: -50px">赛季</label>
                        <div class="layui-input-inline" style="width: 100px">
                            <select class="layui-select" lay-filter="season" lay-search="" name="season">
                                <option th:each="item,userStat:${seasonMap}"
                                        th:text="${userStat.current.value}"
                                        th:value="${userStat.current.key}"></option>
                            </select>
                        </div>
                    </div>

                    <button class="layui-btn" id="searchTournamentButton" style="margin-left: 20px;margin-top: -5px"
                            type="button">查看
                    </button>

                </div>

            </form>

            <table class="layui-table" id="tournamentTable" lay-filter="tournamentTable"></table>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

</body>

<script th:replace="layout::baseScript"></script>

<div th:replace="layout::entryInputLayer"></div>

<script th:inline="none">
    layui.use(['table'], function () {

        let $ = layui.jquery, table = layui.table;

        $("#searchTournamentButton").on('click', function () {
            let leagueId = $("input[name=leagueId]").val();
            let name = $("input[name=name]").val();
            let creator = $("input[name=creator]").val();
            let season = $("select[name=season]").val();

            table.render({
                elem: '#tournamentTable',
                method: 'post',
                contentType: 'application/json',
                url: '/my_fpl/qryTournamenList',
                where: {
                    name: name,
                    creator: creator,
                    leagueId: leagueId,
                    season: season
                },
                loading: true,
                width: 820,
                cols: [[
                    {
                        field: 'name',
                        title: '名字',
                        align: 'center',
                        templet: '<div><a href="javascript:void(0);" class="layui-table-link">{{d.name}}</a></div>'
                    },
                    {field: 'creator', title: '创建者', align: 'center', width: 150},
                    {field: 'season', title: '赛季', align: 'center', width: 80},
                    {field: 'leagueType', title: '类型', align: 'center', width: 80},
                    {field: 'leagueId', title: '官方联赛id', align: 'center', width: 100},
                    {field: 'createTime', title: '创建时间', align: 'center', width: 120}
                ]],
                id: 'tournamenTable'
            });

        });

        table.on('row(tournamentTable)', function (obj) {
            let leagueId = obj.data.leagueId;
            let leagueType = obj.data.leagueType;
            window.location.replace('/my_fpl/leagueReport?leagueId=' + leagueId + "&leagueType=" + leagueType);
        });

    });
</script>

</html>
