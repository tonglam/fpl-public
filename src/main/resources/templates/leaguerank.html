<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout::header(~{::title},~{})">
    <title>小联赛排名-实时结果-letletme</title>
</head>

<body>

<div th:replace="layout::topnav"></div>

<div class="layui-fluid">
    <div class="layui-main">
        <div class="site-content">

            <h1 style="font-size: 28px">小联赛排名</h1>

            <div style="margin-top: 20px"></div>

            <div class="layui-tab" lay-allowClose="true" lay-filter="leagueTab">
                <ul class="layui-tab-title">
                    <li class="layui-this">选择小联赛</li>
                </ul>
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="tournamentTable" lay-filter="tournamentTable"></table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="layout::footer"></div>

</body>

<script th:replace="layout::baseScript"></script>

<script th:replace="layout::entryInputLayer"></script>

<script th:inline="none">
    layui.use(['element', 'form', 'table', 'layer', 'soulTable'], function () {

        let $ = layui.jquery, element = layui.element, table = layui.table, soulTable = layui.soulTable,
            layer = layui.layer;

        soulTable.config({
            drag: false,
            overflow: {
                type: 'tips',
                header: true,
                total: true
            }
        });

        table.render({
            elem: '#tournamentTable',
            method: 'post',
            contentType: 'application/json',
            url: '/tournament/qryTournamenList',
            loading: true,
            cellMinWidth: 80,
            cols: [[
                {field: 'name', title: '名字', align: 'center', width: 250, templet: '#nameTpl'},
                {field: 'creator', title: '创建者', align: 'center', edit: 'text', width: 150},
                {field: 'season', title: '赛季', align: 'center'},
                {field: 'leagueType', title: '类型', align: 'center'},
                {field: 'leagueId', title: '官方联赛id', align: 'center', width: 100}
            ]],
            initSort: {
                field: 'name',
                type: 'asc'
            },
            id: 'tournamenTable',
            done: function () {
                soulTable.render(this);
            }
        });

        table.on('row(tournamentTable)', function (obj) {
            let tournamentId = obj.data.id, name = obj.data.name;
            // 是否存在
            if ($(".layui-tab-title li[lay-id='" + tournamentId + "']").length > 0) {
                //选项卡已经存在
                element.tabChange('leagueTab', tournamentId);
                return false;
            }
            // 增加标签页
            element.tabAdd('leagueTab', {
                title: name,
                content: '<table class="layui-table" id="liveLeagueTable" lay-filter="liveLeagueTable"></table>',
                id: tournamentId
            });
            // 切换
            element.tabChange('leagueTab', tournamentId);
        });

        element.on('tab(leagueTab)', function () {
            let tournamentId = $(this).attr("lay-id");
            let loadIndex = layer.msg("计算中，请稍等");
            axios.get('/live/qryTournamentLivePoints', {
                params: {
                    tournamentId: tournamentId
                }
            })
                .then(function (response) {
                    layer.close(loadIndex);
                    table.render({
                        elem: '#liveLeagueTable',
                        data: response.data,
                        limit: 200,
                        loading: true,
                        cellMinWidth: 120,
                        cols: [[
                            {title: '排名', type: 'numbers'},
                            {field: 'entryName', title: '队伍名字', align: 'center', width: 200, filter: true},
                            {field: 'playerName', title: '玩家名字', align: 'center', width: 150, filter: true},
                            {
                                field: 'chip', title: '开卡', align: 'center', templet: function (d) {
                                    if (d.chip == null) {
                                        return "无";
                                    } else {
                                        return d.chip;
                                    }
                                }
                            },
                            {field: 'livePoints', title: '实时得分', align: 'center', sort: true, filter: true},
                            {field: 'transferCost', title: '转会扣分', align: 'center'},
                            {field: 'liveNetPoints', title: '实时净得分', align: 'center', sort: true, filter: true},
                            {
                                field: 'eventFinished',
                                title: 'GW已结束',
                                align: 'center',
                                width: 120,
                                templet: function (d) {
                                    if (d.eventFinished == true) {
                                        return "是";
                                    } else {
                                        return "否";
                                    }
                                }
                            }
                        ]],
                        filter: {
                            items: ['condition'],
                            bottom: false
                        },
                        done: function () {
                            soulTable.render(this);
                        },
                        id: 'liveLeagueTable'
                    });
                })
                .catch(function (error) {
                    console.info(error.message);
                    layer.close(loadIndex);
                });
        });

    });
</script>

<script id="nameTpl" type="text/html">
    <a href="javascript:void(0);" class="layui-table-link">{{d.name}}</a>
</script>

</html>
