spring:
  thymeleaf:
    cache: false
    check-template: true
    check-template-location: true
    enabled: true
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html
  mvc:
    static-path-pattern: /static/**
  datasource:
    hikari:
      minimum-idle: 10
      maximum-pool-size: 10
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
server:
  port: 8014
  address: 127.0.0.1
